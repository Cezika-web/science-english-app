<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CZK Admin</title>
  <style>
    :root {
      --accent: #2f86e6; --green: #36b37e; --muted: #6b7280;
      --border: #e6eef8; --bg: #f4f7fa; --danger: #e53e3e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, "Segoe UI", sans-serif; background: var(--bg); color: #0f1724; }

    .header {
      background: #1a3a5c; color: white; padding: 16px 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header h1 { font-size: 1.1rem; font-weight: 800; }
    .header span { font-size: 0.82rem; opacity: 0.7; }
    .btn-sm-danger { background: rgba(255,255,255,0.15); border: none; color: white; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }

    .container { max-width: 960px; margin: 0 auto; padding: 24px 20px; }

    /* Stats bar */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 28px; }
    .stat-card { background: white; border-radius: 12px; padding: 16px; border: 1px solid var(--border); }
    .stat-card .val { font-size: 1.8rem; font-weight: 800; color: var(--accent); }
    .stat-card .lbl { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }

    /* Tabs */
    .tabs { display: flex; gap: 4px; margin-bottom: 20px; }
    .tab { padding: 8px 16px; border-radius: 8px; border: none; background: none; font-size: 0.9rem; cursor: pointer; color: var(--muted); font-weight: 600; }
    .tab.active { background: var(--accent); color: white; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Students table */
    .students-grid { display: grid; gap: 10px; }
    .student-row {
      background: white; border-radius: 12px; padding: 14px 18px;
      border: 1px solid var(--border); display: flex; align-items: center; gap: 14px;
    }
    .avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: #e8f3ff; display: flex; align-items: center;
      justify-content: center; font-weight: 800; color: var(--accent);
      font-size: 1rem; flex-shrink: 0;
    }
    .student-info { flex: 1; min-width: 0; }
    .student-info .name { font-weight: 700; }
    .student-info .email { font-size: 0.8rem; color: var(--muted); }
    .read-badge { font-size: 0.75rem; font-weight: 700; padding: 4px 10px; border-radius: 999px; flex-shrink: 0; }
    .read-badge.read { background: #d1fae5; color: #065f46; }
    .read-badge.unread { background: #fff3cd; color: #92400e; }
    .btn-detail { background: #f0f7ff; border: none; color: var(--accent); padding: 7px 12px; border-radius: 8px; font-size: 0.8rem; font-weight: 700; cursor: pointer; flex-shrink: 0; }

    /* Add student form */
    .form-card { background: white; border-radius: 16px; padding: 24px; border: 1px solid var(--border); max-width: 500px; }
    .form-card h2 { font-size: 1rem; font-weight: 700; margin-bottom: 18px; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 0.83rem; font-weight: 600; margin-bottom: 5px; color: #374151; }
    .field input, .field select {
      width: 100%; padding: 10px 12px; border: 1.5px solid var(--border);
      border-radius: 8px; font-size: 0.95rem; outline: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); }
    .btn-add { background: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 10px; font-size: 0.95rem; font-weight: 700; cursor: pointer; }
    .form-msg { margin-top: 10px; font-size: 0.85rem; display: none; }
    .form-msg.ok { color: var(--green); }
    .form-msg.err { color: var(--danger); }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; padding: 20px; z-index: 100; }
    .modal-overlay.open { display: flex; }
    .modal { background: white; border-radius: 16px; width: 100%; max-width: 540px; max-height: 80vh; overflow-y: auto; }
    .modal-header { padding: 18px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: white; z-index: 1; }
    .modal-header h2 { font-size: 1rem; font-weight: 700; }
    .btn-close { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: var(--muted); }
    .modal-body { padding: 20px; }

    .posaula-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
    .posaula-item:last-child { border-bottom: none; }
    .posaula-item .p-title { font-weight: 600; font-size: 0.95rem; }
    .posaula-item .p-meta { font-size: 0.78rem; color: var(--muted); margin-top: 3px; }
    .posaula-item .p-status { font-size: 0.78rem; font-weight: 700; margin-top: 4px; }
    .posaula-item .p-status.read { color: var(--green); }
    .posaula-item .p-status.unread { color: #f6ad55; }

    .loading { text-align: center; padding: 40px; color: var(--muted); font-size: 0.9rem; }

    /* Login screen */
    #admin-login { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .admin-login-card { background: white; border-radius: 16px; padding: 32px; width: 100%; max-width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); }
    .admin-login-card h1 { font-size: 1.2rem; font-weight: 800; margin-bottom: 4px; }
    .admin-login-card p { font-size: 0.85rem; color: var(--muted); margin-bottom: 24px; }
  </style>
</head>
<body>

  <!-- Admin Login -->
  <div id="admin-login">
    <div class="admin-login-card">
      <h1>🔐 CZK Admin</h1>
      <p>Área exclusiva do professor</p>
      <div class="field"><label>E-mail</label><input type="email" id="a-email" placeholder="cesar@czkenglish.com" /></div>
      <div class="field"><label>Senha</label><input type="password" id="a-pass" placeholder="••••••••" /></div>
      <button class="btn-add" style="width:100%" id="a-login-btn">Entrar</button>
      <div class="form-msg" id="a-login-err"></div>
    </div>
  </div>

  <!-- Admin Panel (hidden until login) -->
  <div id="admin-panel" style="display:none;">
    <div class="header">
      <h1>CZK English — Painel Admin</h1>
      <div style="display:flex;align-items:center;gap:12px;">
        <span id="admin-email-display"></span>
        <button class="btn-sm-danger" id="a-logout-btn">Sair</button>
      </div>
    </div>

    <div class="container">
      <!-- Stats -->
      <div class="stats">
        <div class="stat-card"><div class="val" id="stat-total">—</div><div class="lbl">Alunos ativos</div></div>
        <div class="stat-card"><div class="val" id="stat-read">—</div><div class="lbl">Leram o último pós-aula</div></div>
        <div class="stat-card"><div class="val" id="stat-unread">—</div><div class="lbl">Ainda não leram</div></div>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" data-tab="students">👥 Alunos</button>
        <button class="tab" data-tab="add">➕ Novo aluno</button>
      </div>

      <!-- Students list -->
      <div class="tab-panel active" id="tab-students">
        <div class="students-grid" id="students-grid">
          <div class="loading">Carregando alunos...</div>
        </div>
      </div>

      <!-- Add student -->
      <div class="tab-panel" id="tab-add">
        <div class="form-card">
          <h2>Cadastrar novo aluno</h2>
          <div class="field"><label>Nome completo</label><input type="text" id="f-name" placeholder="Mateus Richter" /></div>
          <div class="field"><label>E-mail (para login)</label><input type="email" id="f-email" placeholder="aluno@email.com" /></div>
          <div class="field"><label>Senha inicial</label><input type="password" id="f-pass" placeholder="Mínimo 6 caracteres" /></div>
          <div class="field"><label>Nível</label>
            <select id="f-level">
              <option value="">Selecione...</option>
              <option>Beginner (A1)</option><option>Elementary (A2)</option>
              <option>Pre-Intermediate (B1)</option><option>Intermediate (B1+)</option>
              <option>Upper-Intermediate (B2)</option><option>Advanced (C1)</option>
            </select>
          </div>
          <div class="field"><label>URL da área do Notion</label><input type="url" id="f-notion" placeholder="https://notion.so/..." /></div>
          <button class="btn-add" id="btn-create-student">Criar aluno</button>
          <div class="form-msg" id="create-msg"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Student detail modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-name">Aluno</h2>
        <button class="btn-close" id="modal-close">✕</button>
      </div>
      <div class="modal-body" id="modal-body">
        <div class="loading">Carregando...</div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, createUserWithEmailAndPassword }
      from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import { getFirestore, collection, getDocs, getDoc, doc, setDoc, query, orderBy, serverTimestamp }
      from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    // ── FIREBASE CONFIG ─── mesma config do app do aluno ───────────────
    const firebaseConfig = {
      apiKey:            "AIzaSyDgDlLyU15p8wQ1YtCN8NebGes_oq3atU8",
      authDomain:        "scienceenglish.firebaseapp.com",
      projectId:         "scienceenglish",
      storageBucket:     "scienceenglish.firebasestorage.app",
      messagingSenderId: "152554774632",
      appId:             "1:152554774632:web:c43dfd4698efb136ed9bdd"
    };
    // ───────────────────────────────────────────────────────────────────

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    let adminUid = null;

    // ── AUTH ────────────────────────────────────────────────────────────
    onAuthStateChanged(auth, user => {
      if (user) {
        adminUid = user.uid;
        document.getElementById('admin-login').style.display = 'none';
        document.getElementById('admin-panel').style.display = 'block';
        document.getElementById('admin-email-display').textContent = user.email;
        loadStudents();
      } else {
        adminUid = null;
        document.getElementById('admin-login').style.display = 'flex';
        document.getElementById('admin-panel').style.display = 'none';
      }
    });

    document.getElementById('a-login-btn').onclick = async () => {
      const email = document.getElementById('a-email').value.trim();
      const pass  = document.getElementById('a-pass').value;
      const err   = document.getElementById('a-login-err');
      try {
        await signInWithEmailAndPassword(auth, email, pass);
      } catch(e) {
        err.textContent = 'E-mail ou senha incorretos.';
        err.className = 'form-msg err'; err.style.display = 'block';
      }
    };

    document.getElementById('a-logout-btn').onclick = () => signOut(auth);

    // ── TABS ────────────────────────────────────────────────────────────
    document.querySelectorAll('.tab').forEach(tab => {
      tab.onclick = () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
      };
    });

    // ── LOAD STUDENTS ───────────────────────────────────────────────────
    async function loadStudents() {
      const grid = document.getElementById('students-grid');
      const snap = await getDocs(collection(db, 'students'));
      const students = snap.docs.map(d => ({ uid: d.id, ...d.data() }));

      let readCount = 0;
      const rows = await Promise.all(students.map(async s => {
        const posSnap = await getDocs(query(collection(db, 'students', s.uid, 'posaulas'), orderBy('createdAt', 'desc')));
        const latest = posSnap.docs[0]?.data();
        const isRead = !!latest?.readAt;
        if (isRead) readCount++;
        return { ...s, latestRead: isRead, latestTitle: latest?.title || null };
      }));

      document.getElementById('stat-total').textContent  = students.length;
      document.getElementById('stat-read').textContent   = readCount;
      document.getElementById('stat-unread').textContent = students.length - readCount;

      grid.innerHTML = rows.map(s => `
        <div class="student-row">
          <div class="avatar">${(s.firstName || s.name || '?')[0].toUpperCase()}</div>
          <div class="student-info">
            <div class="name">${esc(s.name || s.firstName || 'Aluno')}</div>
            <div class="email">${esc(s.email || '')} · ${esc(s.level || '')}</div>
          </div>
          ${s.latestTitle
            ? `<span class="read-badge ${s.latestRead ? 'read' : 'unread'}">${s.latestRead ? '✓ Lido' : '⏳ Não lido'}</span>`
            : `<span class="read-badge" style="background:#f3f4f6;color:var(--muted)">Sem pós-aula</span>`
          }
          <button class="btn-detail" data-uid="${s.uid}" data-name="${esc(s.name || s.firstName || 'Aluno')}">Ver →</button>
        </div>
      `).join('') || '<div class="loading">Nenhum aluno cadastrado.</div>';

      grid.querySelectorAll('.btn-detail').forEach(btn => {
        btn.onclick = () => openDetail(btn.dataset.uid, btn.dataset.name);
      });
    }

    // ── STUDENT DETAIL MODAL ────────────────────────────────────────────
    async function openDetail(uid, name) {
      document.getElementById('modal-name').textContent = name;
      document.getElementById('modal-body').innerHTML = '<div class="loading">Carregando...</div>';
      document.getElementById('modal').classList.add('open');

      const posSnap = await getDocs(query(collection(db, 'students', uid, 'posaulas'), orderBy('createdAt', 'desc')));
      if (posSnap.empty) {
        document.getElementById('modal-body').innerHTML = '<div class="loading">Nenhum pós-aula ainda.</div>';
        return;
      }

      document.getElementById('modal-body').innerHTML = posSnap.docs.map(d => {
        const p = d.data();
        const isRead = !!p.readAt;
        return `
          <div class="posaula-item">
            <div class="p-title">${esc(p.title || 'Pós-Aula')}</div>
            <div class="p-meta">Enviado: ${fmtDate(p.createdAt)}</div>
            <div class="p-status ${isRead ? 'read' : 'unread'}">
              ${isRead ? `✓ Lido em ${fmtDate(p.readAt)}` : '⏳ Ainda não lido'}
            </div>
          </div>`;
      }).join('');
    }

    document.getElementById('modal-close').onclick = () => document.getElementById('modal').classList.remove('open');
    document.getElementById('modal').onclick = e => { if (e.target === e.currentTarget) e.currentTarget.classList.remove('open'); };

    // ── CREATE STUDENT ──────────────────────────────────────────────────
    document.getElementById('btn-create-student').onclick = async () => {
      const name   = document.getElementById('f-name').value.trim();
      const email  = document.getElementById('f-email').value.trim();
      const pass   = document.getElementById('f-pass').value;
      const level  = document.getElementById('f-level').value;
      const notion = document.getElementById('f-notion').value.trim();
      const msg    = document.getElementById('create-msg');

      if (!name || !email || !pass) { showMsg('Preencha nome, e-mail e senha.', 'err'); return; }
      if (pass.length < 6)          { showMsg('Senha mínima de 6 caracteres.', 'err'); return; }

      try {
        // Create auth user
        const cred = await createUserWithEmailAndPassword(auth, email, pass);
        // Save profile
        await setDoc(doc(db, 'students', cred.user.uid), {
          name, firstName: name.split(' ')[0], email, level: level || '',
          notionUrl: notion || '', createdAt: serverTimestamp()
        });
        showMsg(`✅ Aluno ${name} criado com sucesso!`, 'ok');
        ['f-name','f-email','f-pass','f-notion'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('f-level').value = '';
        loadStudents();
      } catch(e) {
        const m = { 'auth/email-already-in-use': 'Este e-mail já está cadastrado.' };
        showMsg(m[e.code] || `Erro: ${e.message}`, 'err');
      }
    };

    function showMsg(text, type) {
      const el = document.getElementById('create-msg');
      el.textContent = text; el.className = `form-msg ${type}`; el.style.display = 'block';
    }

    function fmtDate(ts) {
      if (!ts) return '—';
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      return d.toLocaleDateString('pt-BR', { day:'2-digit', month:'short', year:'numeric' });
    }

    function esc(s = '') {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>

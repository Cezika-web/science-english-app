function fmtDate(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('pt-BR', { day:'2-digit', month:'long', year:'numeric' });
}

function fmtCourseStart(v) {
  if (!v) return '';
  // v vem como "AAAA-MM-DD" (input date) ou timestamp
  let d;
  if (typeof v === 'string' && /^\d{4}-\d{2}-\d{2}/.test(v)) {
    const [y, m, dd] = v.split('-');
    d = new Date(Number(y), Number(m) - 1, Number(dd));
  } else {
    d = v.toDate ? v.toDate() : new Date(v);
  }
  if (isNaN(d)) return '';
  const dataStr = d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });
  const meses = Math.max(0, (new Date().getFullYear() - d.getFullYear()) * 12 + (new Date().getMonth() - d.getMonth()));
  let tempo = '';
  if (meses < 1) tempo = 'este mês';
  else if (meses < 12) tempo = `há ${meses} ${meses === 1 ? 'mês' : 'meses'}`;
  else {
    const anos = Math.floor(meses / 12), rest = meses % 12;
    tempo = `há ${anos} ${anos === 1 ? 'ano' : 'anos'}${rest ? ` e ${rest} ${rest === 1 ? 'mês' : 'meses'}` : ''}`;
  }
  return `${dataStr} · ${tempo}`;
}

const { useState, useEffect, useRef } = React;

// ── Interactive exercise engine (universal) ──────────────────────
// Turns any activity HTML into interactive exercises:
//   - "a) .. b) .. c) .." on a line  -> tappable multiple choice
//   - "___" blanks                   -> inline growing text inputs
//   - a paragraph that is only blanks -> a growing writing textarea
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function parseChoice(text) {
  const re = /([a-eA-E])\)\s*/g;
  const marks = []; let m;
  while ((m = re.exec(text)) !== null) marks.push({ letter: m[1].toLowerCase(), start: m.index, end: re.lastIndex });
  if (marks.length < 2) return null;
  const seq = []; let expIdx = 0;
  for (const mk of marks) {
    if (mk.letter === String.fromCharCode(97 + expIdx)) { seq.push(mk); expIdx++; }
  }
  if (seq.length < 2) return null;
  const stem = text.slice(0, seq[0].start).replace(/\s+/g,' ').trim();
  const options = seq.map((mk, i) => {
    const endPos = (i + 1 < seq.length) ? seq[i + 1].start : text.length;
    let t = text.slice(mk.end, endPos).replace(/ /g,' ').replace(/\s+/g,' ').trim().replace(/[.;,]$/,'');
    return { letter: mk.letter, text: t };
  });
  return { stem, options };
}

function buildChoice(li, key, choice, ctx) {
  li.innerHTML = '';
  const stem = document.createElement('div');
  stem.className = 'ex-stem';
  stem.innerHTML = escHtml(choice.stem).replace(/_{3,}/g, '<span class="ex-gap">_____</span>');
  li.appendChild(stem);
  const opts = document.createElement('div');
  opts.className = 'ex-opts';
  choice.options.forEach(o => {
    const btn = document.createElement('button');
    btn.type = 'button'; btn.className = 'ex-opt'; btn.dataset.key = key;
    btn.innerHTML = '<span class="ex-letter">' + o.letter.toUpperCase() + '</span><span>' + escHtml(o.text) + '</span>';
    if (ctx.saved[key] === o.letter) { btn.classList.add('sel'); ctx.values[key] = o.letter; }
    btn.addEventListener('click', () => {
      const wasSel = btn.classList.contains('sel');
      opts.querySelectorAll('.ex-opt').forEach(x => x.classList.remove('sel'));
      if (wasSel) {
        delete ctx.values[key];   // clicar de novo desmarca (deixa sem resposta)
      } else {
        btn.classList.add('sel');
        ctx.values[key] = o.letter;
      }
      ctx.onChange();
    });
    opts.appendChild(btn);
  });
  li.appendChild(opts);
}

function buildInlineInputs(el, keys, ctx) {
  const segs = el.innerHTML.split(/(_{3,})/);
  el.innerHTML = '';
  let ki = 0;
  segs.forEach(seg => {
    if (/^_{3,}$/.test(seg)) {
      const key = keys[ki++];
      const inp = document.createElement('input');
      inp.type = 'text'; inp.className = 'ex-input'; inp.dataset.key = key;
      inp.setAttribute('autocomplete','off'); inp.setAttribute('autocapitalize','off'); inp.setAttribute('spellcheck','false');
      const sv = ctx.saved[key] || '';
      inp.value = sv; if (sv) ctx.values[key] = sv;
      const resize = () => { inp.style.width = Math.max(60, (inp.value.length + 1) * 8.5) + 'px'; };
      inp.addEventListener('input', () => { ctx.values[key] = inp.value; resize(); ctx.onChange(); });
      resize();
      el.appendChild(inp);
    } else if (seg) {
      const span = document.createElement('span');
      span.innerHTML = seg;
      while (span.firstChild) el.appendChild(span.firstChild);
    }
  });
}

function buildTextarea(p, key, ctx) {
  p.innerHTML = '';
  const ta = document.createElement('textarea');
  ta.className = 'ex-textarea'; ta.dataset.key = key; ta.rows = 3;
  ta.setAttribute('placeholder', 'Escreva sua resposta aqui...');
  const sv = ctx.saved[key] || '';
  ta.value = sv; if (sv) ctx.values[key] = sv;
  const grow = () => { ta.style.height = 'auto'; ta.style.height = Math.max(72, ta.scrollHeight) + 'px'; };
  ta.addEventListener('input', () => { ctx.values[key] = ta.value; grow(); ctx.onChange(); });
  p.appendChild(ta);
  setTimeout(grow, 0);
}

function shuffleArr(a) {
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}

// Exercício de ARRASTAR (matching): esquerda (PT) fixa, o aluno arrasta a
// tradução (EN) do pool para o espaço na frente de cada palavra.
function buildMatch(list, pairs, keys, ctx) {
  const wrap = document.createElement('div');
  wrap.className = 'ex-match';
  const rowsBox = document.createElement('div'); rowsBox.className = 'ex-match-rows';
  const slots = [];
  pairs.forEach((p, i) => {
    const row = document.createElement('div'); row.className = 'ex-match-row';
    const left = document.createElement('div'); left.className = 'ex-match-left'; left.textContent = p.left;
    const slot = document.createElement('div'); slot.className = 'ex-match-slot'; slot.dataset.idx = i;
    slots.push(slot);
    row.appendChild(left); row.appendChild(slot); rowsBox.appendChild(row);
  });
  const pool = document.createElement('div'); pool.className = 'ex-match-pool';
  wrap.appendChild(rowsBox); wrap.appendChild(pool);

  function recordValue() {
    slots.forEach((slot, i) => {
      const chip = slot.querySelector('.ex-match-chip');
      if (chip) ctx.values[keys[i]] = chip.dataset.text; else delete ctx.values[keys[i]];
    });
    ctx.onChange();
  }
  function placeChip(chip, slot) {
    const existing = slot.querySelector('.ex-match-chip');
    if (existing) pool.appendChild(existing);
    slot.appendChild(chip);
    recordValue();
  }
  function returnChip(chip) { pool.appendChild(chip); recordValue(); }

  function attachDrag(chip) {
    let dragging = false, clone = null, sx = 0, sy = 0, moved = false;
    chip.addEventListener('pointerdown', e => {
      dragging = true; moved = false; sx = e.clientX; sy = e.clientY;
      try { chip.setPointerCapture(e.pointerId); } catch (er) {}
    });
    chip.addEventListener('pointermove', e => {
      if (!dragging) return;
      const dx = e.clientX - sx, dy = e.clientY - sy;
      if (!moved && Math.hypot(dx, dy) > 6) {
        moved = true;
        const r = chip.getBoundingClientRect();
        clone = chip.cloneNode(true);
        clone.classList.add('dragging');
        clone.style.cssText = 'position:fixed;left:' + r.left + 'px;top:' + r.top + 'px;width:' + r.width + 'px;margin:0;z-index:9999;pointer-events:none;';
        clone._w = r.width; clone._h = r.height;
        document.body.appendChild(clone);
        chip.style.opacity = '0.3';
      }
      if (moved && clone) { clone.style.left = (e.clientX - clone._w / 2) + 'px'; clone.style.top = (e.clientY - clone._h / 2) + 'px'; }
    });
    chip.addEventListener('pointerup', e => {
      if (!dragging) return; dragging = false;
      if (!moved) {
        if (chip.parentElement.classList.contains('ex-match-slot')) returnChip(chip);
        return;
      }
      if (clone) { clone.remove(); clone = null; }
      chip.style.opacity = '';
      const el = document.elementFromPoint(e.clientX, e.clientY);
      const slot = el && el.closest ? el.closest('.ex-match-slot') : null;
      if (slot) placeChip(chip, slot);
      moved = false;
    });
  }

  const rights = shuffleArr(pairs.map(p => p.right));
  rights.forEach(text => {
    const chip = document.createElement('div'); chip.className = 'ex-match-chip';
    chip.textContent = text; chip.dataset.text = text; chip.style.touchAction = 'none';
    attachDrag(chip);
    pool.appendChild(chip);
  });

  keys.forEach((k, i) => {
    const sv = ctx.saved[k];
    if (sv) {
      const chip = [...pool.querySelectorAll('.ex-match-chip')].find(c => c.dataset.text === sv && c.parentElement === pool);
      if (chip) placeChip(chip, slots[i]);
    }
  });

  list.replaceWith(wrap);
}

function processExercises(root, ctx) {
  const genKey = () => 'e' + (ctx.keyc.n++);

  // 1) ARRASTAR (matching) — <ol data-match> / <ul data-match> com "PT | EN"
  root.querySelectorAll('ol[data-match], ul[data-match]').forEach(list => {
    const pairs = [];
    list.querySelectorAll('li').forEach(li => {
      const parts = (li.textContent || '').split('|');
      if (parts.length >= 2) pairs.push({ left: parts[0].trim(), right: parts.slice(1).join('|').trim() });
    });
    if (pairs.length === 0) return;
    const keys = pairs.map(() => genKey());
    list.removeAttribute('data-match');
    list.setAttribute('data-match-done', '1');
    if (ctx.build) buildMatch(list, pairs, keys, ctx);
  });

  root.querySelectorAll('li').forEach(li => {
    if (li.closest('[data-match-done]')) return;
    const text = li.textContent || '';
    const choice = parseChoice(text);
    if (choice && choice.options.length >= 2) {
      const key = genKey();
      if (ctx.build) buildChoice(li, key, choice, ctx);
      return;
    }
    const blanks = (li.innerHTML.match(/_{3,}/g) || []);
    if (blanks.length > 0) {
      const keys = blanks.map(() => genKey());
      if (ctx.build) buildInlineInputs(li, keys, ctx);
    }
  });
  root.querySelectorAll('p').forEach(p => {
    if (p.closest('li')) return;
    const blanks = (p.innerHTML.match(/_{3,}/g) || []);
    if (blanks.length === 0) return;
    const pure = (p.textContent || '').replace(/[_\s ]/g,'') === '';
    if (pure) {
      const key = genKey();
      if (ctx.build) buildTextarea(p, key, ctx);
    } else {
      const keys = blanks.map(() => genKey());
      if (ctx.build) buildInlineInputs(p, keys, ctx);
    }
  });
}

// Aplica a correção do professor: colore cada questão (li ou bloco de escrita)
// conforme o status e mostra resposta correta + explicação. Deixa read-only.
const CORR_COLORS = {
  ok:      { bg: 'rgba(22,163,74,0.06)', bd: '#16A34A', tx: '#3B6D11', label: '✓ correto' },
  bobo:    { bg: '#FEFCE8', bd: '#CA8A04', tx: '#854F0B', label: 'Erro bobo' },
  mediano: { bg: '#FFF7ED', bd: '#EA580C', tx: '#9A3412', label: 'Erro mediano' },
  grave:   { bg: '#FEF2F2', bd: '#DC2626', tx: '#991B1B', label: 'Erro grave' },
};
function applyCorrection(container, arr) {
  const qs = [...container.querySelectorAll('li, p')].filter(el =>
    el.tagName === 'LI' || el.querySelector('.ex-textarea'));
  (arr || []).forEach((c, i) => {
    const el = qs[i]; if (!el) return;
    const st = CORR_COLORS[c.status] || CORR_COLORS.ok;
    el.style.borderLeft = '4px solid ' + st.bd;
    el.style.background = st.bg;
    el.style.borderRadius = '0 10px 10px 0';
    el.style.padding = '8px 10px';
    el.style.marginBottom = '10px';
    if (c.status !== 'ok' && (c.correct || c.explain)) {
      const box = document.createElement('div');
      box.style.cssText = 'margin-top:6px;font-size:12px;line-height:1.5;color:' + st.tx + ';';
      box.innerHTML =
        '<div style="font-weight:800;margin-bottom:2px;">' + st.label + '</div>' +
        (c.correct ? '<div><strong>Resposta correta:</strong> ' + escHtml(c.correct) + '</div>' : '') +
        (c.explain ? '<div>' + escHtml(c.explain) + '</div>' : '');
      el.appendChild(box);
    } else if (c.status === 'ok') {
      const tag = document.createElement('div');
      tag.style.cssText = 'margin-top:4px;font-size:11px;font-weight:800;color:' + st.tx + ';';
      tag.textContent = st.label;
      el.appendChild(tag);
    }
  });
  container.querySelectorAll('input, textarea').forEach(x => { x.disabled = true; });
  container.querySelectorAll('.ex-opt, .ex-match-chip').forEach(x => { x.style.pointerEvents = 'none'; });
}

function countExercises(html) {
  if (!html) return 0;
  try {
    const doc = new DOMParser().parseFromString('<div>' + html + '</div>', 'text/html');
    const root = doc.body.firstChild;
    const ctx = { build: false, saved: {}, values: {}, onChange() {}, keyc: { n: 0 } };
    processExercises(root, ctx);
    return ctx.keyc.n;
  } catch (e) { return 0; }
}

// Redimensiona uma imagem (File) para um data URL JPEG pequeno (cabe no Firestore).
function resizeImageFile(file, maxSize = 256) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        const scale = Math.min(1, maxSize / Math.max(width, height));
        const w = Math.round(width * scale), h = Math.round(height * scale);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.85));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function ProgressRing({ value, goal, label, sublabel }) {
  const size = 118, stroke = 11, r = (size - stroke) / 2, c = 2 * Math.PI * r;
  const pct = goal > 0 ? Math.min(value / goal, 1) : 0;
  const off = c - pct * c;
  const complete = goal > 0 && value >= goal;
  const ringColor = complete ? '#F59E0B' : '#16A34A';
  return (
    <GlassCard style={{ padding: 16, flex: 1, minWidth: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8, borderRadius: 24, border: complete ? '1px solid rgba(245,158,11,0.4)' : GLASS.border, animation: complete ? 'ringpop 1.4s ease-in-out infinite' : 'none' }}>
      <div style={{ position: 'relative', width: size, height: size }}>
        <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={complete ? 'rgba(245,158,11,0.15)' : 'rgba(22,163,74,0.12)'} strokeWidth={stroke} />
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={ringColor} strokeWidth={stroke} strokeLinecap="round" strokeDasharray={c} strokeDashoffset={off} style={{ transition: 'stroke-dashoffset 1s ease' }} />
        </svg>
        <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
          {complete && <div style={{ fontSize: 20, lineHeight: 1, marginBottom: 2 }}>&#127881;</div>}
          <div style={{ fontSize: 24, fontWeight: 800, color: complete ? '#B45309' : '#0F172A', lineHeight: 1 }}>{value}</div>
          <div style={{ fontSize: 11, color: '#64748B', fontWeight: 600, marginTop: 2 }}>de {goal}</div>
        </div>
      </div>
      <div style={{ textAlign: 'center' }}>
        <div style={{ fontSize: 12.5, fontWeight: 800, color: complete ? '#B45309' : '#064E3B' }}>{label}</div>
        <div style={{ fontSize: 11.5, fontWeight: 800, color: complete ? '#D97706' : '#16A34A', marginTop: 2 }}>{Math.round(pct * 100)}% da meta</div>
        {sublabel && <div style={{ fontSize: 10.5, color: complete ? '#D97706' : '#64748B', marginTop: 1, fontWeight: complete ? 700 : 500 }}>{sublabel}</div>}
      </div>
    </GlassCard>
  );
}

function HomeTab({ student, posaulas, activities, onOpenPost, onGoActivities }) {
  const latest = posaulas[0] || null;
  const [openMonths, setOpenMonths] = useState({});
  const [btnPressed, setBtnPressed] = useState(false);

  const currentYear = new Date().getFullYear();
  const aulasAno = posaulas.filter(p => {
    const d = p.createdAt?.toDate ? p.createdAt.toDate() : (p.createdAt ? new Date(p.createdAt) : null);
    return d && d.getFullYear() === currentYear;
  }).length;
  const metaAnual = Number(student?.metaAnual) || 40;

  // Atividades da SEMANA = as atuais (ainda não corrigidas). As corrigidas descem pro histórico.
  const semanaAtivs      = activities.filter(a => a.status !== 'corrected');
  const atividadesTotal  = semanaAtivs.length;
  const atividadesFeitas = semanaAtivs.filter(a => a.finalizada).length;
  const weekAtual        = semanaAtivs[0]?.week || '';

  const ativsComplete = atividadesTotal > 0 && atividadesFeitas === atividadesTotal;
  const aulasComplete = metaAnual > 0 && aulasAno >= metaAnual;

  const grouped = React.useMemo(() => {
    const map = {};
    posaulas.slice(1).forEach(p => {
      const k = monthKey(p.createdAt);
      const ord = monthOrder(p.createdAt);
      if (!map[k]) map[k] = { posts: [], ord };
      map[k].posts.push(p);
    });
    return Object.entries(map).sort((a,b) => b[1].ord - a[1].ord);
  }, [posaulas]);

  const pendingActs = activities.filter(a => (a.status||'') !== 'corrected' && !a.finalizada).length;

  return (
    <div className="scroll-area" style={{ padding: '16px 16px 8px' }}>
      <InstallBanner />

      {/* Anéis de progresso: aulas no ano + atividades da semana */}
      <div style={{ display: 'flex', gap: 12, marginBottom: 16 }}>
        <ProgressRing value={aulasAno} goal={metaAnual} label="Aulas no ano" sublabel={aulasComplete ? '🎉 meta batida!' : 'meta do ano'} />
        <ProgressRing value={atividadesFeitas} goal={atividadesTotal} label="Atividades" sublabel={ativsComplete ? '🎉 tudo feito!' : 'da semana'} />

function CorrecaoModal({ data, onClose }) {
  if (!data) return null;
  const acts = (data.acts || []).filter(a => a.report || a.summary || a.correcao);

  const tot = { correct: 0, bobo: 0, mediano: 0, grave: 0 };
  acts.forEach(a => {
    const s = a.summary || {};
    tot.correct += Number(s.correct || 0);
    const e = s.errors || {};
    tot.bobo += Number(e.bobo || 0);
    tot.mediano += Number(e.mediano || 0);
    tot.grave += Number(e.grave || 0);
  });

  const cell = (n, label, bg, color) => (
    <div style={{ background: bg, borderRadius: 10, padding: '8px 10px' }}>
      <div style={{ fontSize: 18, fontWeight: 800, color }}>{n}</div>
      <div style={{ fontSize: 10.5, color, fontWeight: 600 }}>{label}</div>

  return (
    <div className={'modal-overlay' + (data ? ' open' : '')} onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-sheet modal-sheet-full">
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '14px 16px', borderBottom: '1px solid #F1F5F9', position: 'sticky', top: 0, background: 'white', zIndex: 1, flexShrink: 0, paddingTop: 'calc(14px + env(safe-area-inset-top, 0px))' }}>

          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 11, color: '#9A6438', fontWeight: 800, textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 1 }}>Correção</div>
            <div style={{ fontSize: 14, fontWeight: 700, color: '#0F172A', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{data.wk || ''}</div>
          </div>
        </div>

        <div style={{ flex: 1, overflowY: 'auto', padding: 16 }}>
          {/* Contagem geral */}
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, marginBottom: 16 }}>
            {cell(tot.correct, 'acertos', '#EAF3DE', '#3B6D11')}

            {cell(tot.grave, 'erros graves', '#FEF2F2', '#991B1B')}
          </div>

          {/* Relatório(s) completo(s) — 6 blocos */}
          {acts.map((a, i) => (
            (a.report || (a.feedback && Object.keys(a.feedback).length)) && (
              <div key={a.id || i} style={{ marginBottom: 16 }}>
                <div style={{ fontSize: 13, fontWeight: 800, color: '#0F172A', marginBottom: 8 }}>{a.emoji || '📚'} {a.title || 'Atividade'}</div>
                {a.report && (
                  <div style={{ background: '#F8FAFC', border: '1px solid #E2E8F0', borderRadius: 12, padding: 14, fontSize: 13, lineHeight: 1.6, color: '#334155', whiteSpace: 'pre-wrap', fontFamily: 'inherit' }}>{a.report}</div>
                )}
              </div>
            )
          ))}

          {acts.length === 0 && (
            <div style={{ textAlign: 'center', color: '#64748B', fontSize: 13, padding: 24 }}>Relatório de correção ainda não disponível.</div>
          )}
        </div>
      </div>
    </div>
  );
}

function ExtraModal({ extra, onClose, onFinish }) {
  const contentRef = useRef(null);
  const valuesRef  = useRef({});
  const [stats, setStats]   = useState({ total: 0, filled: 0 });
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    if (!extra || !contentRef.current) return;
    const container = contentRef.current;
    const saved  = extra.respostas || {};
    const values = {};
    valuesRef.current = values;
    container.innerHTML = extra.content || '<p style="color:#94A3B8">Sem questões — use o link acima.</p>';
    const recount = () => {
      let filled = 0;
      Object.keys(values).forEach(k => {
        const v = values[k];
        if (typeof v === 'string' ? v.trim() !== '' : !!v) filled++;
      });
      setStats({ total: ctx.keyc.n, filled });
    };
    const ctx = { build: true, saved, values, onChange: recount, keyc: { n: 0 } };
    processExercises(container, ctx);
    recount();
  }, [extra]);

  const total     = stats.total;
  const filled    = stats.filled;
  const canFinish = total === 0 ? true : filled >= total;
  const pct       = total === 0 ? 100 : Math.round((filled / total) * 100);
  const skillInfo = SKILLS.find(s => s.id === extra?.skill);

  const handleFinish = async () => {
    if (!canFinish || saving) return;
    setSaving(true);
    await onFinish(extra, { values: { ...valuesRef.current }, respondidos: filled, total, pct });
    setSaving(false);
  };

  return (
    <div className={'modal-overlay' + (extra ? ' open' : '')} onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-sheet modal-sheet-full">
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '14px 16px', borderBottom: '1px solid #F1F5F9', position: 'sticky', top: 0, background: 'white', zIndex: 1, flexShrink: 0, paddingTop: 'calc(14px + env(safe-area-inset-top, 0px))' }}>
          <button onClick={onClose} style={{ width: 32, height: 32, borderRadius: '50%', border: 'none', background: '#F1F5F9', cursor: 'pointer', fontSize: 18, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#374151', flexShrink: 0, fontFamily: 'inherit' }}>&#8249;</button>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 11, color: '#9A6438', fontWeight: 800, textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 1 }}>{skillInfo ? skillInfo.icon + ' ' + skillInfo.label : 'Extra'}</div>
            <div style={{ fontSize: 14, fontWeight: 700, color: '#0F172A', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{extra?.title || 'Atividade'}</div>
          </div>
          {total > 0 && (
            <div style={{ fontSize: 12, fontWeight: 800, color: pct === 100 ? '#16A34A' : '#9A6438', flexShrink: 0 }}>{pct}%</div>
          )}
        </div>

        <div style={{ flex: 1, overflowY: 'auto' }}>
          {(extra?.link || extra?.intro) && (
            <div style={{ padding: '14px 16px 0' }}>
              {extra?.intro && <div style={{ fontSize: 13.5, color: '#374151', lineHeight: 1.6, marginBottom: 10 }}>{extra.intro}</div>}
              {extra?.link && (
                <a href={extra.link} target="_blank" rel="noopener noreferrer" style={{
                  display: 'block', textAlign: 'center', background: 'linear-gradient(180deg,#22C55E,#16A34A)', color: '#fff',
                  textDecoration: 'none', padding: '13px 18px', borderRadius: 14, fontWeight: 800, fontSize: 14,
                  boxShadow: '0 6px 18px rgba(22,163,74,0.3)',
                }}>&#9654; Assistir / Abrir</a>
              )}
            </div>
          )}
          <div ref={contentRef} className="ex-root" style={{ padding: 16, fontSize: 14.5, lineHeight: 1.75, color: '#1F2937' }} />
        </div>

        <div style={{ padding: '12px 16px', paddingBottom: 'calc(16px + env(safe-area-inset-bottom, 0px))', borderTop: '1px solid #F1F5F9', flexShrink: 0 }}>
          {!canFinish && (
            <div style={{ fontSize: 12, color: '#D97706', marginBottom: 8, textAlign: 'center', fontWeight: 600 }}>
              Responda todos os exercicios para finalizar ({filled}/{total})
            </div>
          )}
          <button onClick={handleFinish} disabled={!canFinish || saving} style={{
            width: '100%', padding: 14, border: 'none', borderRadius: 14, fontSize: 15, fontWeight: 800, fontFamily: 'inherit',
            cursor: canFinish && !saving ? 'pointer' : 'not-allowed',
            background: canFinish ? 'linear-gradient(180deg,#22C55E,#16A34A)' : '#CBD5E1',
            color: '#fff', boxShadow: canFinish ? '0 8px 20px rgba(22,163,74,0.3)' : 'none',
          }}>
            {saving ? 'Salvando...' : extra?.finalizada ? '✓ Salvar alteracoes' : 'Finalizei'}
          </button>
        </div>
      </div>
    </div>
  );
}

function AulasTab({ activities, onOpenActivity, extras, onOpenExtra, onOpenCorrecao }) {
  const [sub, setSub] = useState('atividades');
  const [openHist, setOpenHist] = useState({});

  const groupByWeek = (list) => {
    const map = {}, order = [];
    list.forEach(act => {
      const wk = act.week || 'Atividades recentes';
      if (!map[wk]) { map[wk] = []; order.push(wk); }
      map[wk].push(act);
    });
    return order.map(wk => ({ wk, acts: map[wk] }));
  };

  const atuaisByWeek = React.useMemo(() => groupByWeek(activities.filter(a => a.status !== 'corrected')), [activities]);
  const histByWeek   = React.useMemo(() => groupByWeek(activities.filter(a => a.status === 'corrected')), [activities]);
  const temHistorico = histByWeek.length > 0;
  const temAtuais    = atuaisByWeek.length > 0;

  return (
    <div className="scroll-area" style={{ padding: '16px 16px 8px' }}>
      <div style={{ display: 'flex', background: 'rgba(255,255,255,0.6)', borderRadius: 14, padding: 4, marginBottom: 16, border: '1px solid rgba(22,163,74,0.12)' }}>
        {['atividades', 'extras'].map(s => (
          <button key={s} onClick={() => setSub(s)} style={{
            flex: 1, padding: '9px 0', borderRadius: 11, border: 'none', cursor: 'pointer',
            background: sub === s ? 'linear-gradient(180deg,#22C55E,#16A34A)' : 'transparent',
            color: sub === s ? '#fff' : '#64748B', fontWeight: sub === s ? 800 : 600, fontSize: 13,
            transition: 'background 0.2s, color 0.2s', fontFamily: 'inherit',
          }}>{s === 'atividades' ? 'Atividades' : 'Extras'}</button>
        ))}
      </div>

      {sub === 'atividades' && (activities.length === 0 ? (
        <GlassCard style={{ padding: 32, textAlign: 'center' }}>
          <div style={{ fontSize: 36, marginBottom: 10 }}>&#9999;&#65039;</div>
          <div style={{ fontSize: 15, fontWeight: 700, color: '#0F172A', marginBottom: 4 }}>Sem atividades ainda</div>
          <div style={{ fontSize: 13, color: '#64748B' }}>O professor publicara em breve.</div>
        </GlassCard>
      ) : (
        <React.Fragment>
          {/* ── Atividades atuais (da semana) ── */}
          {temAtuais ? atuaisByWeek.map(({ wk, acts }) => (
            <div key={wk} style={{ marginBottom: 16 }}>
              <div style={{ fontSize: 11, fontWeight: 800, color: '#9A6438', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 8 }}>&#128197; {wk}</div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                {acts.map(act => <ActivityRow key={act.id} act={act} onOpenActivity={onOpenActivity} />)}
              </div>
            </div>
          )) : (
            <GlassCard style={{ padding: 24, textAlign: 'center', marginBottom: 16 }}>
              <div style={{ fontSize: 30, marginBottom: 8 }}>&#9989;</div>
              <div style={{ fontSize: 14, fontWeight: 700, color: '#0F172A' }}>Nenhuma atividade nova no momento</div>
              <div style={{ fontSize: 12.5, color: '#64748B', marginTop: 2 }}>Suas atividades corrigidas estao no historico abaixo.</div>
            </GlassCard>
          )}

          {/* ── Histórico (corrigidas) ── */}
          {temHistorico && (
            <div style={{ marginTop: 8 }}>
              <div style={{ fontSize: 11, fontWeight: 800, color: '#9A6438', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 10 }}>&#128193; Historico de atividades</div>
              {histByWeek.map(({ wk, acts }) => {
                const open = openHist[wk] === true;
                return (
                  <div key={wk} style={{ marginBottom: 8 }}>
                    <button onClick={() => setOpenHist(o => ({ ...o, [wk]: !open }))} style={{
                      width: '100%', background: 'rgba(255,255,255,0.6)', border: '1px solid rgba(22,163,74,0.12)', borderRadius: 14,
                      padding: '11px 16px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', cursor: 'pointer', fontFamily: 'inherit',
                    }}>
                      <span style={{ fontSize: 12.5, fontWeight: 800, color: '#7C4A21', textTransform: 'capitalize' }}>{wk}</span>
                      <span style={{ fontSize: 11, color: '#94A3B8', display: 'flex', alignItems: 'center', gap: 6 }}>
                        <span>{acts.length} corrigida{acts.length !== 1 ? 's' : ''}</span>
                        <span style={{ fontSize: 14 }}>{open ? '▾' : '▸'}</span>
                      </span>
                    </button>
                    {open && (
                      <div style={{ marginTop: 6, display: 'flex', flexDirection: 'column', gap: 8 }}>
                        {acts.map(act => <ActivityRow key={act.id} act={act} onOpenActivity={onOpenActivity} />)}
                        {acts.some(a => a.report || a.summary || a.correcao) && (
                          <GlassCard tappable onClick={() => onOpenCorrecao(wk, acts)} style={{ padding: '16px 18px', display: 'flex', alignItems: 'center', gap: 14, border: '1px solid rgba(22,163,74,0.25)' }}>
                            <div style={{ fontSize: 24, width: 46, height: 46, borderRadius: 14, background: 'rgba(22,163,74,0.12)', border: '1px solid rgba(22,163,74,0.25)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>📋</div>
                            <div style={{ flex: 1, minWidth: 0 }}>
                              <div style={{ fontSize: 15, fontWeight: 800, color: '#064E3B', marginBottom: 2 }}>Correção</div>
                              <div style={{ fontSize: 12, color: '#64748B' }}>Relatório completo — erros, padrões e resumo</div>
                            </div>
                            <span style={{ color: '#94A3B8', fontSize: 20, lineHeight: 1 }}>›</span>
                          </GlassCard>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </React.Fragment>
      ))}

      {sub === 'extras' && <ExtrasSection extras={extras} onOpenExtra={onOpenExtra} />}
      <div style={{ height: 12 }} />
    </div>
  );
}

// ── VocabTab ─────────────────────────────────────────────────────
function VocabTab({ vocab }) {
  const [openMonths, setOpenMonths] = useState({});

  const grouped = React.useMemo(() => {
    const map = {};
    vocab.forEach(v => {
      const k = monthKey(v.date);
      const ord = monthOrder(v.date);
      if (!map[k]) map[k] = { words: [], ord };
      map[k].words.push(v);
    });
    return Object.entries(map).sort((a,b) => b[1].ord - a[1].ord);
  }, [vocab]);

  if (vocab.length === 0) return (
    <div className="scroll-area" style={{ padding: '16px 16px 8px' }}>
      <GlassCard style={{ padding: 36, textAlign: 'center' }}>
        <div style={{ fontSize: 42, marginBottom: 12 }}>&#128292;</div>
        <div style={{ fontSize: 17, fontWeight: 800, color: '#0F172A', marginBottom: 6 }}>Vocabulario</div>
        <div style={{ fontSize: 13, color: '#64748B', lineHeight: 1.5 }}>Aqui aparecerao as palavras das suas pos-aulas, agrupadas por mes.</div>
      </GlassCard>
    </div>
  );

  return (
    <div className="scroll-area" style={{ padding: '16px 16px 8px' }}>
      <GlassCard style={{ padding: '16px 18px', marginBottom: 14, display: 'flex', alignItems: 'center', gap: 14 }}>
        <div style={{ width: 46, height: 46, borderRadius: 14, background: 'rgba(139,94,52,0.1)', border: '1px solid rgba(139,94,52,0.22)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 22, flexShrink: 0 }}>&#128292;</div>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 15, fontWeight: 800, color: '#0F172A' }}>Meu Vocabulario</div>
          <div style={{ fontSize: 12.5, color: '#64748B', marginTop: 2 }}>{vocab.length} palavra{vocab.length !== 1 ? 's' : ''} · direto das suas pos-aulas</div>
        </div>
        <Pill style={{ fontSize: 10, padding: '4px 10px' }}>MEU VOCABULARIO</Pill>
      </GlassCard>

      {grouped.map(([month, { words }]) => {
        const open = openMonths[month] !== false;
        return (
          <div key={month} style={{ marginBottom: 10 }}>
            <button onClick={() => setOpenMonths(o => ({ ...o, [month]: !open }))} style={{
              width: '100%', background: 'rgba(255,255,255,0.6)', border: '1px solid rgba(22,163,74,0.12)', borderRadius: 14,
              padding: '11px 16px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', cursor: 'pointer', fontFamily: 'inherit',
            }}>
              <span style={{ fontSize: 13, fontWeight: 800, color: '#7C4A21', textTransform: 'capitalize' }}>{month}</span>
              <span style={{ fontSize: 11, color: '#94A3B8', display: 'flex', alignItems: 'center', gap: 6 }}>
                <span>{words.length} palavra{words.length !== 1 ? 's' : ''}</span>
                <span style={{ fontSize: 14 }}>{open ? '▾' : '▸'}</span>
              </span>
            </button>
            {open && (
              <div style={{ marginTop: 6, display: 'flex', flexDirection: 'column', gap: 6 }}>
                {words.map((v, i) => (
                  <div key={i} style={{
                    background: 'rgba(255,255,255,0.6)', border: '1px solid rgba(22,163,74,0.1)',
                    borderRadius: 14, padding: '12px 16px',
                    display: 'flex', alignItems: 'center', gap: 12,
                  }}>
                    <div style={{ width: 34, height: 34, borderRadius: 10, background: 'rgba(139,94,52,0.1)', border: '1px solid rgba(139,94,52,0.18)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, fontSize: 15 }}>&#127760;</div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ display: 'flex', alignItems: 'baseline', gap: 8, flexWrap: 'wrap' }}>
                        <span style={{ fontSize: 14.5, fontWeight: 700, color: '#0F172A' }}>{v.en}</span>
                        <span style={{ fontSize: 13, color: '#16A34A', fontWeight: 600 }}>{v.pt}</span>
                      </div>
                      {v.source && <div style={{ fontSize: 11, color: '#94A3B8', marginTop: 2, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{v.source}</div>}
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })}
      <div style={{ height: 12 }} />
    </div>
  );
}

// ── PerfilTab ─────────────────────────────────────────────────────
function PerfilTab({ student, onLogout, onPatchStudent }) {
  const name    = student?.firstName || student?.name || 'Aluno';
  const level   = student?.level || '';
  const initial = name[0].toUpperCase();
  const [showEmail, setShowEmail] = useState(false);
  const [showPass, setShowPass]   = useState(false);
  const [newEmail, setNewEmail]   = useState('');
  const [newPass, setNewPass]     = useState('');
  const [confPass, setConfPass]   = useState('');
  const [currPass, setCurrPass]   = useState('');
  const [saving, setSaving]       = useState(false);
  const [msg, setMsg]             = useState('');
  const [photoSaving, setPhotoSaving] = useState(false);
  const [pwVisible, setPwVisible]     = useState(false);
  const fileRef = useRef(null);

  const onPhotoPick = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setPhotoSaving(true);
    try {
      const dataUrl = await resizeImageFile(file, 256);
      await onPatchStudent({ photo: dataUrl });
    } catch(err) {
      showToast('Erro ao enviar foto.');
    }
    setPhotoSaving(false);
    e.target.value = '';
  };

  const copyPix = () => {
    navigator.clipboard?.writeText(PIX_KEY).then(() => showToast('✅ Pix copiado!'));
  };

  const doReauth = async (fb) => {
    if (!currPass) throw { code: 'need-currpass' };
    const cred = fb.EmailAuthProvider.credential(fb.auth.currentUser.email, currPass);
    await fb.reauthenticateWithCredential(fb.auth.currentUser, cred);
  };

  const updateEmailFn = async () => {
    if (!newEmail) return;
    setSaving(true); setMsg('');
    try {
      const fb = await getFB();
      try { await fb.updateEmail(fb.auth.currentUser, newEmail); }
      catch(e) { if (e.code === 'auth/requires-recent-login') { await doReauth(fb); await fb.updateEmail(fb.auth.currentUser, newEmail); } else throw e; }
      setMsg('✅ E-mail atualizado!'); setShowEmail(false); setNewEmail(''); setCurrPass('');
    } catch(e) {
      if (e.code === 'need-currpass') setMsg('Digite sua senha atual no campo abaixo.');
      else if (e.code === 'auth/email-already-in-use') setMsg('❌ E-mail ja em uso.');
      else setMsg('❌ ' + (e.message || 'Erro'));
    }
    setSaving(false);
  };

  const updatePassFn = async () => {
    if (!newPass || newPass !== confPass) { setMsg('As senhas nao coincidem.'); return; }
    setSaving(true); setMsg('');
    try {
      const fb = await getFB();
      try { await fb.updatePassword(fb.auth.currentUser, newPass); }
      catch(e) { if (e.code === 'auth/requires-recent-login') { await doReauth(fb); await fb.updatePassword(fb.auth.currentUser, newPass); } else throw e; }
      await onPatchStudent({ senha: newPass }).catch(() => {});
      setMsg('✅ Senha atualizada!'); setShowPass(false); setNewPass(''); setConfPass(''); setCurrPass('');
    } catch(e) {
      if (e.code === 'need-currpass') setMsg('Digite sua senha atual no campo abaixo.');
      else setMsg('❌ ' + (e.message || 'Erro'));
    }
    setSaving(false);
  };

  const inp = { width: '100%', padding: '12px 14px', border: '1.5px solid #E2E8F0', borderRadius: 12, fontSize: 14, outline: 'none', background: '#F8FAFC', color: '#0F172A', marginBottom: 8, fontFamily: 'inherit' };
  const actBtn = (color = '#16A34A') => ({ width: 92, padding: '10px 0', textAlign: 'center', borderRadius: 12, border: 'none', cursor: 'pointer', background: color, color: '#fff', fontWeight: 700, fontSize: 13, marginRight: 6, marginTop: 4, fontFamily: 'inherit', flexShrink: 0 });

  return (
    <div className="scroll-area" style={{ padding: '16px 16px 8px' }}>
      <GlassCard style={{ padding: '28px 20px', textAlign: 'center', marginBottom: 14 }}>
        <div style={{ position: 'relative', width: 88, height: 88, margin: '0 auto 12px' }}>
          {student?.photo ? (
            <img src={student.photo} alt="" style={{ width: 88, height: 88, borderRadius: '50%', objectFit: 'cover', boxShadow: '0 8px 24px rgba(22,163,74,0.3)' }} />
          ) : (
            <div style={{ width: 88, height: 88, borderRadius: '50%', background: 'linear-gradient(145deg,#16A34A,#064E3B)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 36, fontWeight: 800, color: '#fff', boxShadow: '0 8px 24px rgba(22,163,74,0.3)' }}>{initial}</div>
          )}
          <button onClick={() => fileRef.current?.click()} disabled={photoSaving} title="Alterar foto" style={{
            position: 'absolute', bottom: 0, right: 0, width: 30, height: 30, borderRadius: '50%',
            background: '#16A34A', color: '#fff', border: '2px solid #fff', cursor: 'pointer',
            fontSize: 14, display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: '0 2px 8px rgba(0,0,0,0.2)',
          }}>{photoSaving ? '…' : '📷'}</button>
          <input ref={fileRef} type="file" accept="image/*" onChange={onPhotoPick} style={{ display: 'none' }} />
        </div>
        <div style={{ fontSize: 20, fontWeight: 800, color: '#0F172A', marginBottom: 8 }}>{name}</div>
        {level && <Pill>{level}</Pill>}
      </GlassCard>

      {/* Informações do curso (Zoom e Pix fixos; dias por aluno) */}
      <GlassCard style={{ padding: 18, marginBottom: 12 }}>
        <div style={{ fontSize: 11, fontWeight: 800, color: '#9A6438', textTransform: 'uppercase', letterSpacing: 0.8, marginBottom: 12 }}>Informações do curso</div>

        <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 14 }}>
          <div style={{ fontSize: 20, flexShrink: 0 }}>🎥</div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 12, color: '#64748B', fontWeight: 600 }}>Sala do Zoom</div>
            <div style={{ fontSize: 13.5, color: '#16A34A', fontWeight: 700, marginTop: 1 }}>Entrar na aula</div>
          </div>
          <a href={ZOOM_LINK} target="_blank" rel="noopener noreferrer" style={{ width: 92, textAlign: 'center', boxSizing: 'border-box', background: '#16A34A', color: '#fff', textDecoration: 'none', padding: '10px 0', borderRadius: 12, fontWeight: 700, fontSize: 13, flexShrink: 0 }}>Abrir</a>
        </div>

        <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: student?.diasAulas ? 14 : 0 }}>
          <div style={{ fontSize: 20, flexShrink: 0 }}>💰</div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 12, color: '#64748B', fontWeight: 600 }}>Pix para pagamento</div>
            <div style={{ fontSize: 13.5, color: '#0F172A', fontWeight: 600, marginTop: 1, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{PIX_KEY}</div>
          </div>
          <button onClick={copyPix} style={{ width: 92, padding: '10px 0', textAlign: 'center', background: '#16A34A', color: '#fff', border: 'none', borderRadius: 12, fontWeight: 700, fontSize: 13, flexShrink: 0, cursor: 'pointer', fontFamily: 'inherit' }}>Copiar</button>
        </div>

        {student?.diasAulas && (
          <div style={{ display: 'flex', alignItems: 'flex-start', gap: 12, marginBottom: student?.inicioCurso ? 14 : 0 }}>
            <div style={{ fontSize: 20, flexShrink: 0 }}>📅</div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 12, color: '#64748B', fontWeight: 600 }}>Dias e horário das aulas</div>
              <div style={{ fontSize: 14, color: '#0F172A', fontWeight: 600, marginTop: 1 }}>{student.diasAulas}</div>
            </div>
          </div>
        )}

        {student?.inicioCurso && (
          <div style={{ display: 'flex', alignItems: 'flex-start', gap: 12 }}>
            <div style={{ fontSize: 20, flexShrink: 0 }}>🎓</div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 12, color: '#64748B', fontWeight: 600 }}>Início das aulas</div>
              <div style={{ fontSize: 14, color: '#0F172A', fontWeight: 600, marginTop: 1 }}>{fmtCourseStart(student.inicioCurso)}</div>
            </div>
          </div>
        )}
      </GlassCard>

      <GlassCard style={{ padding: 18, marginBottom: 12 }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: showEmail ? 14 : 0 }}>
          <div>
            <div style={{ fontSize: 13, fontWeight: 700, color: '#0F172A' }}>E-mail</div>
            <div style={{ fontSize: 12.5, color: '#64748B', marginTop: 2 }}>{student?.email || ''}</div>
          </div>
          <button onClick={() => { setShowEmail(!showEmail); setShowPass(false); setMsg(''); }} style={actBtn()}>{showEmail ? 'Cancelar' : 'Alterar'}</button>
        </div>
        {showEmail && (
          <div>
            <input type="email" value={newEmail} onChange={e => setNewEmail(e.target.value)} placeholder="Novo e-mail" style={inp} />
            <input type="password" value={currPass} onChange={e => setCurrPass(e.target.value)} placeholder="Senha atual (se solicitado)" style={inp} />
            <button onClick={updateEmailFn} disabled={saving} style={actBtn()}>Salvar</button>
          </div>
        )}
      </GlassCard>

      <GlassCard style={{ padding: 18, marginBottom: 12 }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: showPass ? 14 : 0 }}>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: '#0F172A' }}>Senha</div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginTop: 2 }}>
              <span style={{ fontSize: 12.5, color: '#64748B' }}>
                {pwVisible ? (student?.senha || 'Senha não registrada — defina uma nova') : '••••••••'}
              </span>
              <button type="button" onClick={() => setPwVisible(v => !v)} title={pwVisible ? 'Ocultar senha' : 'Mostrar senha'} style={{
                background: 'none', border: 'none', cursor: 'pointer', fontSize: 15, padding: 0, lineHeight: 1,
              }}>{pwVisible ? '🙈' : '👁️'}</button>
            </div>
          </div>
          <button onClick={() => { setShowPass(!showPass); setShowEmail(false); setMsg(''); }} style={actBtn()}>{showPass ? 'Cancelar' : 'Alterar'}</button>
        </div>
        {showPass && (
          <div>
            <input type="text" value={newPass} onChange={e => setNewPass(e.target.value)} placeholder="Nova senha" style={inp} autoCapitalize="off" autoCorrect="off" />
            <input type="text" value={confPass} onChange={e => setConfPass(e.target.value)} placeholder="Confirmar nova senha" style={inp} autoCapitalize="off" autoCorrect="off" />
            <input type="password" value={currPass} onChange={e => setCurrPass(e.target.value)} placeholder="Senha atual (se solicitado)" style={inp} />
            <button onClick={updatePassFn} disabled={saving} style={actBtn()}>Salvar</button>
          </div>
        )}
      </GlassCard>

      {msg && (
        <div style={{ padding: '12px 16px', borderRadius: 12, marginBottom: 12, background: msg.startsWith('✅') ? 'rgba(22,163,74,0.1)' : 'rgba(220,38,38,0.08)', color: msg.startsWith('✅') ? '#064E3B' : '#991B1B', fontSize: 13, fontWeight: 600 }}>{msg}</div>
      )}

      <GlassCard style={{ padding: 18 }}>
        <button onClick={onLogout} style={{ width: '100%', padding: 14, border: 'none', borderRadius: 14, background: 'rgba(220,38,38,0.08)', color: '#991B1B', fontWeight: 700, fontSize: 15, cursor: 'pointer', fontFamily: 'inherit' }}>Sair da conta</button>
      </GlassCard>
      <div style={{ height: 12 }} />
    </div>
  );
}

// ── Activity Modals ──────────────────────────────────────────────
function ActivityModal({ activity, onClose, onOpenPart }) {
  const parts = activity?.parts || [];
  return (
    <div className={'modal-overlay' + (activity ? ' open' : '')} onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-sheet">
        <div className="modal-drag" />
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '14px 16px 12px', borderBottom: '1px solid #F1F5F9', position: 'sticky', top: 0, background: 'white', borderRadius: '24px 24px 0 0', zIndex: 1 }}>
          <div style={{ fontSize: 26, lineHeight: 1 }}>{activity?.emoji || '&#128218;'}</div>
          <div style={{ flex: 1 }}>
            {activity?.week && <div style={{ fontSize: 11, color: '#9A6438', fontWeight: 800, textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 2 }}>{activity.week}</div>}
            <div style={{ fontSize: 15, fontWeight: 800, color: '#0F172A' }}>{activity?.title || 'Atividade'}</div>
          </div>
          <button onClick={onClose} style={{ width: 32, height: 32, borderRadius: '50%', border: 'none', background: '#F1F5F9', cursor: 'pointer', fontSize: 16, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#374151', fontFamily: 'inherit' }}>&#x2715;</button>
        </div>
        <div style={{ padding: 16 }}>
          <div style={{ fontSize: 13, color: '#64748B', marginBottom: 12 }}>Selecione uma parte para comecar:</div>
          {parts.map((part, i) => {
            const pid    = part.id || part.title;
            const pconcl = activity?.conclusao?.parts?.[pid];
            const pdone  = activity?.partsDone?.[pid];
            return (
            <button key={i} onClick={() => onOpenPart(part)} style={{
              display: 'flex', alignItems: 'center', gap: 14, width: '100%',
              background: '#F8FAFC', border: '1.5px solid #E2E8F0', borderRadius: 14,
              padding: 16, marginBottom: 10, cursor: 'pointer', textAlign: 'left', fontFamily: 'inherit',
            }}>
              <div style={{ width: 34, height: 34, background: pdone ? 'linear-gradient(145deg,#16A34A,#064E3B)' : 'linear-gradient(145deg,#22C55E,#16A34A)', color: '#fff', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14, fontWeight: 800, flexShrink: 0 }}>{pdone ? '✓' : i+1}</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 14, fontWeight: 700, color: '#0F172A' }}>{part.title || 'Parte ' + (i+1)}</div>
                {part.type && <div style={{ fontSize: 12, color: '#64748B', marginTop: 2 }}>{part.type}</div>}
              </div>
              {pdone ? (
                <span style={{ fontSize: 11.5, fontWeight: 800, color: '#16A34A', flexShrink: 0 }}>Feita</span>
              ) : pconcl ? (
                <span style={{ fontSize: 11.5, fontWeight: 800, color: '#9A6438', flexShrink: 0 }}>{pconcl.pct}%</span>
              ) : (
                <span style={{ color: '#94A3B8', fontSize: 20, lineHeight: 1 }}>&#8250;</span>
              )}
            </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function PartModal({ part, activity, onBack, onClose, onFinish }) {
  const contentRef = useRef(null);
  const valuesRef  = useRef({});
  const [stats, setStats]   = useState({ total: 0, filled: 0 });
  const [saving, setSaving] = useState(false);

  const partId    = part ? (part.id || part.title || '') : '';
  const fb_item   = activity?.feedback && part ? (activity.feedback[part.id || part.title]) : null;
  const isCorrected = activity?.status === 'corrected';
  const alreadyDone = !!(activity?.partsDone && activity.partsDone[partId]);

  useEffect(() => {
    if (!part || !contentRef.current) return;
    const container = contentRef.current;
    const saved  = (activity?.respostas && activity.respostas[partId]) || {};
    const values = {};
    valuesRef.current = values;
    container.innerHTML = part.content || '<p style="color:#94A3B8">Conteudo nao disponivel.</p>';
    const recount = () => {
      let filled = 0;
      Object.keys(values).forEach(k => {
        const v = values[k];
        if (typeof v === 'string' ? v.trim() !== '' : !!v) filled++;
      });
      setStats({ total: ctx.keyc.n, filled });
    };
    const ctx = { build: true, saved, values, onChange: recount, keyc: { n: 0 } };
    processExercises(container, ctx);
    recount();
    if (isCorrected && activity?.correcao && activity.correcao[partId]) {
      applyCorrection(container, activity.correcao[partId]);
    }
  }, [part, activity]);

  const total     = stats.total;
  const filled    = stats.filled;
  const canFinish = total === 0 ? true : filled >= total;
  const pct       = total === 0 ? 100 : Math.round((filled / total) * 100);

  const handleFinish = async () => {
    if (!canFinish || saving) return;
    setSaving(true);
    await onFinish(partId, { values: { ...valuesRef.current }, respondidos: filled, total, pct });
    setSaving(false);
  };

  return (
    <div className={'modal-overlay' + (part ? ' open' : '')} onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-sheet modal-sheet-full">
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '14px 16px', borderBottom: '1px solid #F1F5F9', position: 'sticky', top: 0, background: 'white', zIndex: 1, flexShrink: 0, paddingTop: 'calc(14px + env(safe-area-inset-top, 0px))' }}>
          <button onClick={onBack} style={{ width: 32, height: 32, borderRadius: '50%', border: 'none', background: '#F1F5F9', cursor: 'pointer', fontSize: 18, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#374151', flexShrink: 0, fontFamily: 'inherit' }}>&#8249;</button>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 11, color: '#9A6438', fontWeight: 800, textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 1 }}>{activity?.title}</div>
            <div style={{ fontSize: 14, fontWeight: 700, color: '#0F172A' }}>{part?.title || 'Parte'}</div>
          </div>
          {total > 0 && !isCorrected && (
            <div style={{ fontSize: 12, fontWeight: 800, color: pct === 100 ? '#16A34A' : '#9A6438', flexShrink: 0 }}>{pct}%</div>
          )}
          <button onClick={onClose} style={{ width: 32, height: 32, borderRadius: '50%', border: 'none', background: '#F1F5F9', cursor: 'pointer', fontSize: 16, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#374151', flexShrink: 0, fontFamily: 'inherit' }}>&#x2715;</button>
        </div>

        <div ref={contentRef} className="ex-root" style={{ flex: 1, overflowY: 'auto', padding: 16, fontSize: 14.5, lineHeight: 1.75, color: '#1F2937' }} />

        {fb_item && (
          <div style={{ margin: '0 16px 16px', background: 'rgba(22,163,74,0.08)', border: '1px solid rgba(22,163,74,0.2)', borderRadius: 14, padding: 16, flexShrink: 0 }}>
            <div style={{ fontWeight: 700, color: '#064E3B', marginBottom: 8, fontSize: 13 }}>
              &#128221; Correcao do professor
              {fb_item.score && <span style={{ display: 'inline-block', background: '#064E3B', color: '#fff', fontSize: 11, fontWeight: 700, padding: '2px 10px', borderRadius: 999, marginLeft: 8 }}>{fb_item.score}</span>}
            </div>
            <div style={{ fontSize: 13, color: '#374151', lineHeight: 1.6 }}>{typeof fb_item === 'string' ? fb_item : (fb_item.comment || '')}</div>
          </div>
        )}

        {!isCorrected && (
          <div style={{ padding: '12px 16px', paddingBottom: 'calc(16px + env(safe-area-inset-bottom, 0px))', borderTop: '1px solid #F1F5F9', flexShrink: 0 }}>
            {!canFinish && (
              <div style={{ fontSize: 12, color: '#D97706', marginBottom: 8, textAlign: 'center', fontWeight: 600 }}>
                Responda todos os exercicios para finalizar ({filled}/{total})
              </div>
            )}
            <button onClick={handleFinish} disabled={!canFinish || saving} style={{
              width: '100%', padding: 14, border: 'none', borderRadius: 14, fontSize: 15, fontWeight: 800, fontFamily: 'inherit',
              cursor: canFinish && !saving ? 'pointer' : 'not-allowed',
              background: canFinish ? 'linear-gradient(180deg,#22C55E,#16A34A)' : '#CBD5E1',
              color: '#fff', boxShadow: canFinish ? '0 8px 20px rgba(22,163,74,0.3)' : 'none',
            }}>
              {saving ? 'Salvando...' : alreadyDone ? '✓ Salvar alteracoes' : 'Finalizei esta parte'}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── ReaderView ───────────────────────────────────────────────────
function ReaderView({ post, onBack }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
      <div style={{ background: 'linear-gradient(180deg,#16A34A,#064E3B)', padding: '14px 16px', display: 'flex', alignItems: 'center', gap: 12, flexShrink: 0 }}>
        <button onClick={onBack} style={{ width: 36, height: 36, borderRadius: '50%', background: 'rgba(255,255,255,0.2)', border: 'none', color: '#fff', fontSize: 20, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, fontFamily: 'inherit' }}>&#8249;</button>
        <div style={{ fontSize: 14.5, fontWeight: 700, color: '#fff', flex: 1, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{post?.title || 'Pos-Aula'}</div>
      </div>
      <iframe className="reader-frame" src={post?.url || 'about:blank'} allowFullScreen />
    </div>
  );
}

// ── Loading ──────────────────────────────────────────────────────
function LoadingScreen() {
  return <LoadingSplash />;
}

// ── ROOT APP ─────────────────────────────────────────────────────
function App() {
  const [loading, setLoading]           = useState(true);
  const [user, setUser]                 = useState(null);
  const [student, setStudent]           = useState(null);
  const [posaulas, setPosaulas]         = useState([]);
  const [activities, setActivities]     = useState([]);
  const [vocab, setVocab]               = useState([]);
  const [extras, setExtras]             = useState([]);
  const [openExtra, setOpenExtra]       = useState(null);
  const [openCorrecao, setOpenCorrecao] = useState(null);
  const [tab, setTab]                   = useState('home');
  const [readerPost, setReaderPost]     = useState(null);
  const [openActivity, setOpenActivity] = useState(null);
  const [openPart, setOpenPart]         = useState(null);
  const [showNotifBtn, setShowNotifBtn] = useState(false);
  const [celebrate, setCelebrate]       = useState(false);
  const pendingPostId = useRef(new URLSearchParams(window.location.search).get('post') || '');
  const mirrorUid = useRef(new URLSearchParams(window.location.search).get('mirror') || '');
  const mirror = !!mirrorUid.current;

  // ── Comemoração (confete): dispara na hora que completa, em qualquer aba ──
  useEffect(() => {
    if (!student) return;
    const currentYear = new Date().getFullYear();
    const aulasAno = posaulas.filter(p => {
      const d = p.createdAt?.toDate ? p.createdAt.toDate() : (p.createdAt ? new Date(p.createdAt) : null);
      return d && d.getFullYear() === currentYear;
    }).length;
    const metaAnual  = Number(student?.metaAnual) || 40;
    const semanaAtivs = activities.filter(a => a.status !== 'corrected');
    const total       = semanaAtivs.length;
    const feitas      = semanaAtivs.filter(a => a.finalizada).length;
    const weekAtual   = semanaAtivs[0]?.week || '';

    let fire = false;
    if (total > 0 && feitas === total) {
      const k = `celeb-ativs-${student.uid}-${weekAtual}-${total}`;
      if (!localStorage.getItem(k)) { localStorage.setItem(k, '1'); fire = true; }
    }
    if (metaAnual > 0 && aulasAno >= metaAnual) {
      const k = `celeb-aulas-${student.uid}-${metaAnual}-${aulasAno}`;
      if (!localStorage.getItem(k)) { localStorage.setItem(k, '1'); fire = true; }
    }
    if (fire) setCelebrate(true);
  }, [student, posaulas, activities]);

  useEffect(() => {
    let unsub;
    (async () => {
      const fb = await getFB();
      unsub = fb.onAuthStateChanged(fb.auth, async u => {
        if (u) {
          setUser(u);
          const dataUid = mirror ? mirrorUid.current : u.uid;
          await loadData(dataUid, fb);
          if (!mirror) {
            updateNotifBtn();
            syncPushIfGranted(u.uid, fb);
            if (fb.messaging) {
              fb.onMessage(fb.messaging, payload => {
                showToast('&#128196; ' + (payload.notification?.body || 'Novo pos-aula disponivel!'));
                loadData(u.uid, fb);
              });
            }
          }
        } else {
          setUser(null); setStudent(null); setPosaulas([]); setActivities([]);
        }
        setLoading(false);
      });
    })();
    window.addEventListener('request-notif', handleRequestNotif);
    window.addEventListener('appinstalled', () => { localStorage.setItem('installDismissed','1'); updateNotifBtn(); });
    return () => { unsub?.(); window.removeEventListener('request-notif', handleRequestNotif); };
  }, []);

  async function loadData(uid, fb) {
    const [snap, posSnaps, actSnaps, vocSnaps, extSnaps] = await Promise.all([
      fb.getDoc(fb.doc(fb.db, 'students', uid)),
      fb.getDocs(fb.query(fb.collection(fb.db, 'students', uid, 'posaulas'), fb.orderBy('createdAt','desc'))),
      fb.getDocs(fb.query(fb.collection(fb.db, 'students', uid, 'activities'), fb.orderBy('createdAt','desc'))).catch(() => ({ docs: [] })),
      fb.getDocs(fb.query(fb.collection(fb.db, 'students', uid, 'vocabulario'), fb.orderBy('date','desc'))).catch(() => ({ docs: [] })),
      fb.getDocs(fb.collection(fb.db, 'students', uid, 'extras')).catch(() => ({ docs: [] })),
    ]);
    if (!snap.exists()) return;
    setStudent({ ...snap.data(), uid });
    const posts = posSnaps.docs.map(d => ({ id: d.id, ...d.data() }));
    setPosaulas(posts);
    setActivities(actSnaps.docs.map(d => ({ id: d.id, ...d.data() })));
    setVocab(vocSnaps.docs.map(d => ({ id: d.id, ...d.data() })));
    setExtras(extSnaps.docs.map(d => ({ id: d.id, ...d.data() })));
    if (pendingPostId.current && posts.length > 0) {
      const target = posts.find(p => p.id === pendingPostId.current || p.filename === pendingPostId.current);
      if (target) {
        pendingPostId.current = '';
        window.history.replaceState({}, '', window.location.pathname);
        openPost(target, fb, uid);
      }
    }
  }

  async function openPost(post, fb, uid) {
    setReaderPost(post);
    if (mirror) return;
    try {
      const f = fb || await getFB();
      const u = uid || user?.uid;
      if (u) await f.updateDoc(f.doc(f.db, 'students', u, 'posaulas', post.id), { readAt: f.serverTimestamp() });
    } catch(e) {}
  }

  function updateNotifBtn() {
    if (typeof Notification === 'undefined') { setShowNotifBtn(false); return; }
    setShowNotifBtn(Notification.permission === 'default' && isStandalone());
  }

  const handleRequestNotif = () => requestPush();

  async function requestPush() {
    const fb = await getFB();
    if (!fb.messaging) { showToast('Notificacoes nao suportadas neste dispositivo.'); return; }
    try {
      const perm = await Notification.requestPermission();
      if (perm !== 'granted') return;
      const sw = await getSW();
      const opts = { vapidKey: VAPID_KEY };
      if (sw) opts.serviceWorkerRegistration = sw;
      const token = await fb.getToken(fb.messaging, opts);
      if (token && user) {
        await fb.setDoc(fb.doc(fb.db, 'students', user.uid), { fcmToken: token, fcmTokens: fb.arrayUnion(token) }, { merge: true });
        localStorage.setItem('notifEnabled','1');
        setShowNotifBtn(false);
        showToast('✅ Notificacoes ativadas!');
      }
    } catch(e) {
      showToast('❌ ' + e.message);
    }
  }

  async function syncPushIfGranted(uid, fb) {
    if (!fb.messaging || typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
    try {
      const sw = await getSW();
      const opts = { vapidKey: VAPID_KEY };
      if (sw) opts.serviceWorkerRegistration = sw;
      const token = await fb.getToken(fb.messaging, opts);
      if (token) await fb.setDoc(fb.doc(fb.db, 'students', uid), { fcmToken: token, fcmTokens: fb.arrayUnion(token) }, { merge: true });
    } catch(e) {}
  }

  async function handleLogout() {
    const fb = await getFB();
    await fb.signOut(fb.auth);
  }

  async function patchStudent(patch) {
    if (!user || mirror) return;
    const fb = await getFB();
    await fb.setDoc(fb.doc(fb.db, 'students', user.uid), patch, { merge: true });
    setStudent(s => ({ ...s, ...patch }));
  }

  async function handleFinishExtra(extra, result) {
    if (!user) return;
    if (mirror) { showToast('👁 Modo espelho — somente leitura'); return; }
    const fb = await getFB();
    const conclusao = { respondidos: result.respondidos, total: result.total, pct: result.pct };
    try {
      await fb.updateDoc(fb.doc(fb.db, 'students', user.uid, 'extras', extra.id), {
        respostas: result.values, finalizada: true, conclusao,
        finalizadaEm: fb.serverTimestamp(),
      });
    } catch(e) { showToast('Erro ao salvar: ' + e.message); return; }
    const updated = { ...extra, respostas: result.values, finalizada: true, conclusao };
    setExtras(prev => prev.map(x => x.id === extra.id ? updated : x));
    setOpenExtra(null);
    showToast('Atividade extra finalizada! 🎉');
  }

  if (loading) return <LoadingScreen />;
  if (!user)   return <LoginScreen />;

  if (readerPost) {
    return (
      <ReaderView post={readerPost} onBack={async () => {
        setReaderPost(null);
        const fb = await getFB();
        const snaps = await fb.getDocs(fb.query(fb.collection(fb.db, 'students', user.uid, 'posaulas'), fb.orderBy('createdAt','desc')));
        setPosaulas(snaps.docs.map(d => ({ id: d.id, ...d.data() })));
      }} />
    );
  }

  const handleOpenPost     = (post) => { getFB().then(fb => openPost(post, fb, user.uid)); };
  const handleOpenActivity = (act)  => setOpenActivity(act);
  const handleOpenPart     = (part) => setOpenPart(part);
  const handleClosePart    = ()     => setOpenPart(null);
  const handleCloseAll     = ()     => { setOpenPart(null); setOpenActivity(null); };
  const handleGoActivities = ()     => setTab('aulas');

  async function handleFinishPart(partId, result) {
    if (!openActivity || !user) return;
    if (mirror) { showToast('👁 Modo espelho — somente leitura'); return; }
    const fb = await getFB();
    const actId = openActivity.id;
    const parts = openActivity.parts || [];

    // total exercises across ALL parts (for the activity-level %)
    let sumTotal = 0;
    parts.forEach(p => { sumTotal += countExercises(p.content); });

    const prevParts = (openActivity.conclusao && openActivity.conclusao.parts) || {};
    const newParts  = { ...prevParts, [partId]: { respondidos: result.respondidos, total: result.total, pct: result.pct } };
    let sumResp = 0;
    Object.keys(newParts).forEach(pid => { sumResp += (newParts[pid].respondidos || 0); });
    const atividadePct = sumTotal > 0 ? Math.round((sumResp / sumTotal) * 100) : 100;

    const newDone   = { ...(openActivity.partsDone || {}), [partId]: true };
    const allDone   = parts.every(p => newDone[p.id || p.title]);
    const conclusao = { parts: newParts, atividadePct };
    const respostas = { ...(openActivity.respostas || {}), [partId]: result.values };

    try {
      await fb.updateDoc(fb.doc(fb.db, 'students', user.uid, 'activities', actId), {
        respostas, partsDone: newDone, conclusao, finalizada: allDone,
      });
    } catch(e) { showToast('Erro ao salvar: ' + e.message); return; }

    const updated = { ...openActivity, respostas, partsDone: newDone, conclusao, finalizada: allDone };
    setActivities(prev => prev.map(a => a.id === actId ? updated : a));
    setOpenActivity(updated);
    showToast(allDone ? 'Parte salva! Atividade completa 🎉' : 'Parte salva!');
  }

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%', maxWidth: 480, margin: '0 auto', background: '#F6F1EA' }}>
      {mirror && (
        <div style={{ background: '#1E40AF', color: '#fff', fontSize: 12.5, fontWeight: 700, textAlign: 'center', padding: '7px 12px', flexShrink: 0 }}>
          👁 Modo espelho — {student?.name || student?.firstName || 'aluno'} (somente leitura)
        </div>
      )}
      <AppHeader student={student} onNotif={requestPush} showNotifBtn={showNotifBtn} onLogout={handleLogout} />

      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minHeight: 0 }}>
        {tab === 'home'   && <HomeTab   student={student} posaulas={posaulas} activities={activities} onOpenPost={handleOpenPost} onGoActivities={handleGoActivities} />}
        {tab === 'aulas'  && <AulasTab  activities={activities} onOpenActivity={handleOpenActivity} extras={extras} onOpenExtra={setOpenExtra} onOpenCorrecao={(wk, acts) => setOpenCorrecao({ wk, acts })} />}
        {tab === 'vocab'  && <VocabTab vocab={vocab} />}
        {tab === 'perfil' && <PerfilTab student={student} onLogout={handleLogout} onPatchStudent={patchStudent} />}
      </div>

      <BottomNav active={tab} onChange={setTab} />

      <ActivityModal activity={openActivity} onClose={handleCloseAll} onOpenPart={handleOpenPart} />
      <PartModal part={openPart} activity={openActivity} onBack={handleClosePart} onClose={handleCloseAll} onFinish={handleFinishPart} />
      <ExtraModal extra={openExtra} onClose={() => setOpenExtra(null)} onFinish={handleFinishExtra} />
      <CorrecaoModal data={openCorrecao} onClose={() => setOpenCorrecao(null)} />

      <Celebration show={celebrate} onDone={() => setCelebrate(false)} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

// ── Interactive exercise engine (universal) ──────────────────────
// Turns any activity HTML into interactive exercises:
//   - "a) .. b) .. c) .." on a line  -> tappable multiple choice
//   - "___" blanks                   -> inline growing text inputs
//   - a paragraph that is only blanks -> a growing writing textarea
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function parseChoice(text) {
  const re = /([a-eA-E])\)\s*/g;
  const marks = []; let m;
  while ((m = re.exec(text)) !== null) marks.push({ letter: m[1].toLowerCase(), start: m.index, end: re.lastIndex });
  if (marks.length < 2) return null;
  const seq = []; let expIdx = 0;
  for (const mk of marks) {
    if (mk.letter === String.fromCharCode(97 + expIdx)) { seq.push(mk); expIdx++; }
  }
  if (seq.length < 2) return null;
  const stem = text.slice(0, seq[0].start).replace(/\s+/g,' ').trim();
  const options = seq.map((mk, i) => {
    const endPos = (i + 1 < seq.length) ? seq[i + 1].start : text.length;
    let t = text.slice(mk.end, endPos).replace(/ /g,' ').replace(/\s+/g,' ').trim().replace(/[.;,]$/,'');
    return { letter: mk.letter, text: t };
  });
  return { stem, options };
}

function buildChoice(li, key, choice, ctx) {
  li.innerHTML = '';
  const stem = document.createElement('div');
  stem.className = 'ex-stem';
  stem.innerHTML = escHtml(choice.stem).replace(/_{3,}/g, '<span class="ex-gap">_____</span>');
  li.appendChild(stem);
  const opts = document.createElement('div');
  opts.className = 'ex-opts';
  choice.options.forEach(o => {
    const btn = document.createElement('button');
    btn.type = 'button'; btn.className = 'ex-opt'; btn.dataset.key = key;
    btn.innerHTML = '<span class="ex-letter">' + o.letter.toUpperCase() + '</span><span>' + escHtml(o.text) + '</span>';
    if (ctx.saved[key] === o.letter) { btn.classList.add('sel'); ctx.values[key] = o.letter; }
    btn.addEventListener('click', () => {
      opts.querySelectorAll('.ex-opt').forEach(x => x.classList.remove('sel'));
      btn.classList.add('sel');
      ctx.values[key] = o.letter;
      ctx.onChange();
    });
    opts.appendChild(btn);
  });
  li.appendChild(opts);
}

function buildInlineInputs(el, keys, ctx) {
  const segs = el.innerHTML.split(/(_{3,})/);
  el.innerHTML = '';
  let ki = 0;
  segs.forEach(seg => {
    if (/^_{3,}$/.test(seg)) {
      const key = keys[ki++];
      const inp = document.createElement('input');
      inp.type = 'text'; inp.className = 'ex-input'; inp.dataset.key = key;
      inp.setAttribute('autocomplete','off'); inp.setAttribute('autocapitalize','off'); inp.setAttribute('spellcheck','false');
      const sv = ctx.saved[key] || '';
      inp.value = sv; if (sv) ctx.values[key] = sv;
      const resize = () => { inp.style.width = Math.max(60, (inp.value.length + 1) * 8.5) + 'px'; };
      inp.addEventListener('input', () => { ctx.values[key] = inp.value; resize(); ctx.onChange(); });
      resize();
      el.appendChild(inp);
    } else if (seg) {
      const span = document.createElement('span');
      span.innerHTML = seg;
      while (span.firstChild) el.appendChild(span.firstChild);
    }
  });
}

function buildTextarea(p, key, ctx) {
  p.innerHTML = '';
  const ta = document.createElement('textarea');
  ta.className = 'ex-textarea'; ta.dataset.key = key; ta.rows = 3;
  ta.setAttribute('placeholder', 'Escreva sua resposta aqui...');
  const sv = ctx.saved[key] || '';
  ta.value = sv; if (sv) ctx.values[key] = sv;
  const grow = () => { ta.style.height = 'auto'; ta.style.height = Math.max(72, ta.scrollHeight) + 'px'; };
  ta.addEventListener('input', () => { ctx.values[key] = ta.value; grow(); ctx.onChange(); });
  p.appendChild(ta);
  setTimeout(grow, 0);
}

function processExercises(root, ctx) {
  const genKey = () => 'e' + (ctx.keyc.n++);
  root.querySelectorAll('li').forEach(li => {
    const text = li.textContent || '';
    const choice = parseChoice(text);
    if (choice && choice.options.length >= 2) {
      const key = genKey();
      if (ctx.build) buildChoice(li, key, choice, ctx);
      return;
    }
    const blanks = (li.innerHTML.match(/_{3,}/g) || []);
    if (blanks.length > 0) {
      const keys = blanks.map(() => genKey());
      if (ctx.build) buildInlineInputs(li, keys, ctx);
    }
  });
  root.querySelectorAll('p').forEach(p => {
    if (p.closest('li')) return;
    const blanks = (p.innerHTML.match(/_{3,}/g) || []);
    if (blanks.length === 0) return;
    const pure = (p.textContent || '').replace(/[_\s ]/g,'') === '';
    if (pure) {
      const key = genKey();
      if (ctx.build) buildTextarea(p, key, ctx);
    } else {
      const keys = blanks.map(() => genKey());
      if (ctx.build) buildInlineInputs(p, keys, ctx);
    }
  });
}

function countExercises(html) {
  if (!html) return 0;
  try {
    const doc = new DOMParser().parseFromString('<div>' + html + '</div>', 'text/html');
    const root = doc.body.firstChild;
    const ctx = { build: false, saved: {}, values: {}, onChange() {}, keyc: { n: 0 } };
    processExercises(root, ctx);
    return ctx.keyc.n;
  } catch (e) { return 0; }
}

            style={inp}
            onFocus={e => e.target.style.borderColor = '#16A34A'}
            onBlur={e => e.target.style.borderColor = '#E2E8F0'}
          />
        </div>
        <div style={{ marginBottom: 8 }}>
          <label style={{ display: 'block', fontSize: 13, fontWeight: 700, color: '#374151', marginBottom: 6 }}>Senha</label>
          <input type="password" value={pass} onChange={e => setPass(e.target.value)}
            placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" autoComplete="current-password"
            onKeyDown={e => e.key === 'Enter' && handleLogin()}
            style={inp}
            onFocus={e => e.target.style.borderColor = '#16A34A'}
            onBlur={e => e.target.style.borderColor = '#E2E8F0'}
          />
        </div>
        {error && (
          <div style={{ background: '#FFF5F5', border: '1px solid #FED7D7', color: '#C53030', padding: '10px 14px', borderRadius: 10, fontSize: 13, marginBottom: 10, marginTop: 6 }}>{error}</div>
        )}
        <button disabled={loading} onClick={handleLogin} style={{
          width: '100%', padding: 15, marginTop: 10,
          background: loading ? '#94A3B8' : 'linear-gradient(180deg,#22C55E,#16A34A)',
          color: '#fff', border: 'none', borderRadius: 16,
          fontSize: 16, fontWeight: 800, cursor: loading ? 'not-allowed' : 'pointer',
          boxShadow: '0 8px 24px rgba(22,163,74,0.3)', fontFamily: 'inherit',
        }}>{loading ? 'Entrando...' : 'Entrar'}</button>
      </div>
    </div>
  );
}

let _deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); _deferredPrompt = e; });

function InstallBanner() {
  const [showInstall, setShowInstall] = useState(!!_deferredPrompt && !localStorage.getItem('installDismissed'));
  const [showIos, setShowIos]         = useState(isIOS() && !isStandalone() && !localStorage.getItem('iosInstallDismissed'));
  const [showNotif, setShowNotif]     = useState(isStandalone() && typeof Notification !== 'undefined' && Notification.permission === 'default' && !localStorage.getItem('notifDismissed'));

  const base = {
    display: 'flex', alignItems: 'center', gap: 12, padding: '12px 14px',
    borderRadius: 16, marginBottom: 12,
    background: 'rgba(22,163,74,0.1)', border: '1px solid rgba(22,163,74,0.2)',
  };
  const xBtn = { background: 'none', border: 'none', color: '#64748B', cursor: 'pointer', fontSize: 18, lineHeight: 1, flexShrink: 0, padding: 0 };
  const actBtn = { background: '#16A34A', color: '#fff', border: 'none', borderRadius: 10, padding: '7px 12px', fontWeight: 700, fontSize: 12, cursor: 'pointer', flexShrink: 0, fontFamily: 'inherit' };

  if (showInstall) return (
    <div style={base}>
      <div style={{ flex: 1 }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: '#064E3B' }}>&#128242; Instalar app</div>
        <div style={{ fontSize: 12, color: '#16A34A', marginTop: 2 }}>Adicione a tela inicial para acesso rapido.</div>
      </div>
      <button style={actBtn} onClick={async () => { if (!_deferredPrompt) return; _deferredPrompt.prompt(); await _deferredPrompt.userChoice; localStorage.setItem('installDismissed','1'); setShowInstall(false); _deferredPrompt = null; }}>Instalar</button>
      <button style={xBtn} onClick={() => { setShowInstall(false); localStorage.setItem('installDismissed','1'); }}>&#x2715;</button>
    </div>
  );
  if (showIos) return (
    <div style={base}>
      <div style={{ flex: 1 }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: '#064E3B' }}>&#128242; Instalar app</div>
        <div style={{ fontSize: 12, color: '#16A34A', marginTop: 2 }}>No iPhone: Compartilhar &#8594; Adicionar a Tela de Inicio.</div>
      </div>
      <button style={xBtn} onClick={() => { setShowIos(false); localStorage.setItem('iosInstallDismissed','1'); }}>&#x2715;</button>
    </div>
  );
  if (showNotif) return (
    <div style={base}>
      <div style={{ flex: 1 }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: '#064E3B' }}>&#128276; Ativar notificacoes</div>
        <div style={{ fontSize: 12, color: '#16A34A', marginTop: 2 }}>Receba os pos-aulas neste celular.</div>
      </div>
      <button style={actBtn} onClick={() => { setShowNotif(false); window.dispatchEvent(new CustomEvent('request-notif')); }}>Ativar</button>
      <button style={xBtn} onClick={() => { setShowNotif(false); localStorage.setItem('notifDismissed','1'); }}>&#x2715;</button>
    </div>
  );
  return null;
}

// ── HomeTab ─────────────────────────────────────────────────────
function ProgressRing({ value, goal, label, sublabel }) {
  const size = 118, stroke = 11, r = (size - stroke) / 2, c = 2 * Math.PI * r;
  const pct = goal > 0 ? Math.min(value / goal, 1) : 0;
  const off = c - pct * c;
  const complete = goal > 0 && value >= goal;
  const ringColor = complete ? '#F59E0B' : '#16A34A';
  return (
    <GlassCard style={{ padding: 16, flex: 1, minWidth: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8, borderRadius: 24, border: complete ? '1px solid rgba(245,158,11,0.4)' : GLASS.border, animation: complete ? 'ringpop 1.4s ease-in-out infinite' : 'none' }}>
      <div style={{ position: 'relative', width: size, height: size }}>
        <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={complete ? 'rgba(245,158,11,0.15)' : 'rgba(22,163,74,0.12)'} strokeWidth={stroke} />
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={ringColor} strokeWidth={stroke} strokeLinecap="round" strokeDasharray={c} strokeDashoffset={off} style={{ transition: 'stroke-dashoffset 1s ease' }} />
        </svg>
        <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
          {complete && <div style={{ fontSize: 20, lineHeight: 1, marginBottom: 2 }}>&#127881;</div>}
          <div style={{ fontSize: 24, fontWeight: 800, color: complete ? '#B45309' : '#0F172A', lineHeight: 1 }}>{value}</div>
          <div style={{ fontSize: 11, color: '#64748B', fontWeight: 600, marginTop: 2 }}>de {goal}</div>
        </div>
      </div>
      <div style={{ textAlign: 'center' }}>
        <div style={{ fontSize: 12.5, fontWeight: 800, color: complete ? '#B45309' : '#064E3B' }}>{label}</div>
        {sublabel && <div style={{ fontSize: 10.5, color: complete ? '#D97706' : '#64748B', marginTop: 1, fontWeight: complete ? 700 : 500 }}>{sublabel}</div>}
      </div>
    </GlassCard>
  );
}

function Celebration({ show, onDone }) {
  useEffect(() => {
    if (!show) return;
    const t = setTimeout(onDone, 4500);
    return () => clearTimeout(t);
  }, [show]);
  if (!show) return null;
  const emojis = ['🎉','🎈','🎊','✨','🥳','⭐','🎆'];
  const pieces = Array.from({ length: 46 }).map((_, i) => {
    const left = Math.random() * 100;
    const delay = Math.random() * 0.8;
    const dur = 2.6 + Math.random() * 2.2;
    const size = 18 + Math.random() * 20;
    return (
      <div key={i} style={{ position: 'absolute', left: left + '%', top: '-40px', fontSize: size, animation: `conffall ${dur}s ${delay}s ease-in forwards` }}>
        {emojis[i % emojis.length]}
      </div>
    );
  });
  return <div style={{ position: 'fixed', inset: 0, pointerEvents: 'none', zIndex: 9998, overflow: 'hidden' }}>{pieces}</div>;
}

function HomeTab({ student, posaulas, activities, onOpenPost, onGoActivities }) {
  const latest = posaulas[0] || null;

  const [btnPressed, setBtnPressed] = useState(false);

  const currentYear = new Date().getFullYear();
  const aulasAno = posaulas.filter(p => {
    const d = p.createdAt?.toDate ? p.createdAt.toDate() : (p.createdAt ? new Date(p.createdAt) : null);
    return d && d.getFullYear() === currentYear;
  }).length;
  const metaAnual = Number(student?.metaAnual) || 40;

  // Atividades da SEMANA = as atuais (ainda não corrigidas). As corrigidas descem pro histórico.
  const semanaAtivs      = activities.filter(a => a.status !== 'corrected');
  const atividadesTotal  = semanaAtivs.length;
  const atividadesFeitas = semanaAtivs.filter(a => a.finalizada).length;
  const weekAtual        = semanaAtivs[0]?.week || '';

  const aulasComplete = metaAnual > 0 && aulasAno >= metaAnual;

  const grouped = React.useMemo(() => {
    const map = {};
    posaulas.slice(1).forEach(p => {
      const k = monthKey(p.createdAt);
      const ord = monthOrder(p.createdAt);
      if (!map[k]) map[k] = { posts: [], ord };
      map[k].posts.push(p);
    });
    return Object.entries(map).sort((a,b) => b[1].ord - a[1].ord);

  const pendingActs = activities.filter(a => (a.status||'') !== 'corrected').length;

  return (
    <div className="scroll-area" style={{ padding: '16px 16px 8px' }}>
      <InstallBanner />

        <ProgressRing value={aulasAno} goal={metaAnual} label="Aulas no ano" sublabel={aulasComplete ? '🎉 meta batida!' : 'meta do ano'} />
        <ProgressRing value={atividadesFeitas} goal={atividadesTotal} label="Atividades" sublabel={ativsComplete ? '🎉 tudo feito!' : 'da semana'} />
      </div>

      {latest ? (
        <GlassCard style={{ padding: 22, marginBottom: 14, position: 'relative', overflow: 'hidden' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 14 }}>
            <div style={{ flex: 1 }}>
              <Pill>POS-AULA DA SEMANA</Pill>
              <div style={{ fontSize: 20, fontWeight: 800, color: '#0F172A', marginTop: 12, lineHeight: 1.2 }}>{latest.title || 'Pos-Aula'}</div>
              <div style={{ fontSize: 13, color: '#64748B', marginTop: 4, fontWeight: 500 }}>{fmtDate(latest.createdAt)}</div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 7, marginTop: 12 }}>
                <span style={{ width: 8, height: 8, borderRadius: '50%', background: latest.readAt ? '#16A34A' : '#F59E0B', boxShadow: latest.readAt ? '0 0 0 4px rgba(22,163,74,0.15)' : '0 0 0 4px rgba(245,158,11,0.15)', flexShrink: 0 }} />
                <span style={{ fontSize: 12, fontWeight: 600, color: latest.readAt ? '#16A34A' : '#D97706' }}>{latest.readAt ? 'Lido em ' + fmtDate(latest.readAt) : 'Ainda nao lido'}</span>
              </div>
            </div>
            <div style={{ width: 68, height: 68, borderRadius: 20, flexShrink: 0, background: 'linear-gradient(160deg,#A7F3D0,#16A34A)', display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: '0 10px 24px rgba(22,163,74,0.3)', fontSize: 30 }}>&#128218;</div>
          </div>
          <button
            onPointerDown={() => setBtnPressed(true)}
            onPointerUp={() => setBtnPressed(false)}

              padding: '14px 20px', borderRadius: 16, color: '#fff',

              boxShadow: '0 8px 24px rgba(22,163,74,0.3)',
              transition: 'transform .15s ease',
              transform: btnPressed ? 'scale(0.98)' : 'scale(1)',

          >&#128218; Ler agora</button>

        <GlassCard style={{ padding: 28, marginBottom: 14, textAlign: 'center' }}>
          <div style={{ fontSize: 32, marginBottom: 8 }}>&#128196;</div>
          <div style={{ fontSize: 15, fontWeight: 700, color: '#0F172A', marginBottom: 4 }}>Nenhum pos-aula ainda</div>

                  <div style={{ marginTop: 4, display: 'flex', flexDirection: 'column', gap: 4 }}>

                        borderRadius: 12, padding: '11px 14px',
                        display: 'flex', alignItems: 'center', gap: 12, cursor: 'pointer',
                      }}>
                        <div style={{ width: 32, height: 32, borderRadius: 9, background: 'rgba(22,163,74,0.1)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, fontSize: 14 }}>&#128196;</div>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ fontSize: 13.5, fontWeight: 600, color: '#0F172A', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{p.title || 'Pos-Aula'}</div>

function ActivityRow({ act, onOpenActivity }) {
  const isCorrected = act.status === 'corrected';
  const partsN = (act.parts || []).length;
  const actPct = act.conclusao?.atividadePct;
  return (
    <GlassCard tappable onClick={() => onOpenActivity(act)} style={{ padding: '16px 18px', display: 'flex', alignItems: 'center', gap: 14 }}>
      <div style={{ fontSize: 24, width: 46, height: 46, borderRadius: 14, background: 'rgba(139,94,52,0.1)', border: '1px solid rgba(139,94,52,0.18)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>{act.emoji || '📚'}</div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 15, fontWeight: 700, color: '#0F172A', marginBottom: 2 }}>{act.title || 'Atividade'}</div>
        <div style={{ fontSize: 12, color: '#64748B' }}>
          {partsN} parte{partsN !== 1 ? 's' : ''}
          {isCorrected
            ? <span> · toque para ver a correção</span>
            : (typeof actPct === 'number' && actPct > 0 && <span> · {act.finalizada ? 'Finalizada ✓' : actPct + '% concluída'}</span>)}
        </div>
      </div>
      <span style={{ fontSize: 11.5, fontWeight: 700, padding: '4px 10px', borderRadius: 999, flexShrink: 0, background: isCorrected ? 'rgba(22,163,74,0.12)' : 'rgba(245,158,11,0.12)', color: isCorrected ? '#064E3B' : '#92400E' }}>
        {isCorrected ? '✓ Corrigida' : 'Pendente'}
      </span>
    </GlassCard>
  );
}

function AulasTab({ activities, onOpenActivity }) {
  const [sub, setSub] = useState('atividades');
  const [openHist, setOpenHist] = useState({});

  const groupByWeek = (list) => {
    const map = {}, order = [];
    list.forEach(act => {
      const wk = act.week || 'Atividades recentes';
      if (!map[wk]) { map[wk] = []; order.push(wk); }
      map[wk].push(act);
    });
    return order.map(wk => ({ wk, acts: map[wk] }));
  };

  const atuaisByWeek = React.useMemo(() => groupByWeek(activities.filter(a => a.status !== 'corrected')), [activities]);
  const histByWeek   = React.useMemo(() => groupByWeek(activities.filter(a => a.status === 'corrected')), [activities]);
  const temHistorico = histByWeek.length > 0;
  const temAtuais    = atuaisByWeek.length > 0;

  return (
    <div className="scroll-area" style={{ padding: '16px 16px 8px' }}>
      <div style={{ display: 'flex', background: 'rgba(255,255,255,0.6)', borderRadius: 14, padding: 4, marginBottom: 16, border: '1px solid rgba(22,163,74,0.12)' }}>
        {['atividades', 'extras'].map(s => (
          <button key={s} onClick={() => setSub(s)} style={{
            flex: 1, padding: '9px 0', borderRadius: 11, border: 'none', cursor: 'pointer',
            background: sub === s ? 'linear-gradient(180deg,#22C55E,#16A34A)' : 'transparent',
            color: sub === s ? '#fff' : '#64748B', fontWeight: sub === s ? 800 : 600, fontSize: 13,
            transition: 'background 0.2s, color 0.2s', fontFamily: 'inherit',
          }}>{s === 'atividades' ? 'Atividades' : 'Extras'}</button>
        ))}
      </div>

      {sub === 'atividades' && (activities.length === 0 ? (
        <GlassCard style={{ padding: 32, textAlign: 'center' }}>
          <div style={{ fontSize: 36, marginBottom: 10 }}>&#9999;&#65039;</div>
          <div style={{ fontSize: 15, fontWeight: 700, color: '#0F172A', marginBottom: 4 }}>Sem atividades ainda</div>
          <div style={{ fontSize: 13, color: '#64748B' }}>O professor publicara em breve.</div>
        </GlassCard>
      ) : (
        <React.Fragment>
          {/* ── Atividades atuais (da semana) ── */}
          {temAtuais ? atuaisByWeek.map(({ wk, acts }) => (
            <div key={wk} style={{ marginBottom: 16 }}>
              <div style={{ fontSize: 11, fontWeight: 800, color: '#9A6438', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 8 }}>&#128197; {wk}</div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                {acts.map(act => <ActivityRow key={act.id} act={act} onOpenActivity={onOpenActivity} />)}
              </div>
            </div>
          )) : (
            <GlassCard style={{ padding: 24, textAlign: 'center', marginBottom: 16 }}>
              <div style={{ fontSize: 30, marginBottom: 8 }}>&#9989;</div>
              <div style={{ fontSize: 14, fontWeight: 700, color: '#0F172A' }}>Nenhuma atividade nova no momento</div>
              <div style={{ fontSize: 12.5, color: '#64748B', marginTop: 2 }}>Suas atividades corrigidas estao no historico abaixo.</div>
            </GlassCard>
          )}

          {/* ── Histórico (corrigidas) ── */}
          {temHistorico && (
            <div style={{ marginTop: 8 }}>
              <div style={{ fontSize: 11, fontWeight: 800, color: '#9A6438', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 10 }}>&#128193; Historico de atividades</div>
              {histByWeek.map(({ wk, acts }) => {
                const open = openHist[wk] === true;
                return (
                  <div key={wk} style={{ marginBottom: 8 }}>
                    <button onClick={() => setOpenHist(o => ({ ...o, [wk]: !open }))} style={{
                      width: '100%', background: 'rgba(255,255,255,0.6)', border: '1px solid rgba(22,163,74,0.12)', borderRadius: 14,
                      padding: '11px 16px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', cursor: 'pointer', fontFamily: 'inherit',
                    }}>
                      <span style={{ fontSize: 12.5, fontWeight: 800, color: '#7C4A21', textTransform: 'capitalize' }}>{wk}</span>
                      <span style={{ fontSize: 11, color: '#94A3B8', display: 'flex', alignItems: 'center', gap: 6 }}>
                        <span>{acts.length} corrigida{acts.length !== 1 ? 's' : ''}</span>
                        <span style={{ fontSize: 14 }}>{open ? '▾' : '▸'}</span>
                      </span>
                    </button>
                    {open && (
                      <div style={{ marginTop: 6, display: 'flex', flexDirection: 'column', gap: 8 }}>
                        {acts.map(act => <ActivityRow key={act.id} act={act} onOpenActivity={onOpenActivity} />)}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </React.Fragment>
      ))}

      {sub === 'extras' && (
        <GlassCard style={{ padding: 32, textAlign: 'center' }}>
          <div style={{ fontSize: 36, marginBottom: 10 }}>&#127911;</div>
          <div style={{ fontSize: 15, fontWeight: 700, color: '#0F172A', marginBottom: 4 }}>Atividades Extras</div>
          <div style={{ fontSize: 13, color: '#64748B' }}>Em breve disponivel.</div>
        </GlassCard>
      )}
      <div style={{ height: 12 }} />
    </div>
  );
}

// ── VocabTab ─────────────────────────────────────────────────────
function VocabTab({ vocab }) {
  const [openMonths, setOpenMonths] = useState({});

  const grouped = React.useMemo(() => {
    const map = {};
    vocab.forEach(v => {
      const k = monthKey(v.date);
      const ord = monthOrder(v.date);
      if (!map[k]) map[k] = { words: [], ord };
      map[k].words.push(v);
    });
    return Object.entries(map).sort((a,b) => b[1].ord - a[1].ord);
  }, [vocab]);

  if (vocab.length === 0) return (
    <div className="scroll-area" style={{ padding: '16px 16px 8px' }}>

// ── PerfilTab ─────────────────────────────────────────────────────
function PerfilTab({ student, onLogout }) {
  const name    = student?.firstName || student?.name || 'Aluno';
  const level   = student?.level || '';
  const initial = name[0].toUpperCase();
  const [showEmail, setShowEmail] = useState(false);
  const [showPass, setShowPass]   = useState(false);
  const [newEmail, setNewEmail]   = useState('');
  const [newPass, setNewPass]     = useState('');
  const [confPass, setConfPass]   = useState('');
  const [currPass, setCurrPass]   = useState('');
  const [saving, setSaving]       = useState(false);
  const [msg, setMsg]             = useState('');

  const doReauth = async (fb) => {
    if (!currPass) throw { code: 'need-currpass' };
    const cred = fb.EmailAuthProvider.credential(fb.auth.currentUser.email, currPass);
    await fb.reauthenticateWithCredential(fb.auth.currentUser, cred);
  };

  const updateEmailFn = async () => {
    if (!newEmail) return;
    setSaving(true); setMsg('');
    try {
      const fb = await getFB();
      try { await fb.updateEmail(fb.auth.currentUser, newEmail); }
      catch(e) { if (e.code === 'auth/requires-recent-login') { await doReauth(fb); await fb.updateEmail(fb.auth.currentUser, newEmail); } else throw e; }
      setMsg('✅ E-mail atualizado!'); setShowEmail(false); setNewEmail(''); setCurrPass('');
    } catch(e) {
      if (e.code === 'need-currpass') setMsg('Digite sua senha atual no campo abaixo.');
      else if (e.code === 'auth/email-already-in-use') setMsg('❌ E-mail ja em uso.');
      else setMsg('❌ ' + (e.message || 'Erro'));
    }
    setSaving(false);
  };

  const updatePassFn = async () => {
    if (!newPass || newPass !== confPass) { setMsg('As senhas nao coincidem.'); return; }
    setSaving(true); setMsg('');
    try {
      const fb = await getFB();
      try { await fb.updatePassword(fb.auth.currentUser, newPass); }
      catch(e) { if (e.code === 'auth/requires-recent-login') { await doReauth(fb); await fb.updatePassword(fb.auth.currentUser, newPass); } else throw e; }
      setMsg('✅ Senha atualizada!'); setShowPass(false); setNewPass(''); setConfPass(''); setCurrPass('');
    } catch(e) {
      if (e.code === 'need-currpass') setMsg('Digite sua senha atual no campo abaixo.');
      else setMsg('❌ ' + (e.message || 'Erro'));
    }
    setSaving(false);
  };

  const inp = { width: '100%', padding: '12px 14px', border: '1.5px solid #E2E8F0', borderRadius: 12, fontSize: 14, outline: 'none', background: '#F8FAFC', color: '#0F172A', marginBottom: 8, fontFamily: 'inherit' };
  const actBtn = (color = '#16A34A') => ({ padding: '10px 18px', borderRadius: 12, border: 'none', cursor: 'pointer', background: color, color: '#fff', fontWeight: 700, fontSize: 13, marginRight: 6, marginTop: 4, fontFamily: 'inherit' });

  return (
    <div className="scroll-area" style={{ padding: '16px 16px 8px' }}>
      <GlassCard style={{ padding: '28px 20px', textAlign: 'center', marginBottom: 14 }}>
        <div style={{ width: 72, height: 72, borderRadius: '50%', margin: '0 auto 12px', background: 'linear-gradient(145deg,#16A34A,#064E3B)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 30, fontWeight: 800, color: '#fff', boxShadow: '0 8px 24px rgba(22,163,74,0.3)' }}>{initial}</div>
        <div style={{ fontSize: 20, fontWeight: 800, color: '#0F172A', marginBottom: 8 }}>{name}</div>
        {level && <Pill>{level}</Pill>}
      </GlassCard>

      <GlassCard style={{ padding: 18, marginBottom: 12 }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: showEmail ? 14 : 0 }}>
          <div>
            <div style={{ fontSize: 13, fontWeight: 700, color: '#0F172A' }}>E-mail</div>
            <div style={{ fontSize: 12.5, color: '#64748B', marginTop: 2 }}>{student?.email || ''}</div>
          </div>
          <button onClick={() => { setShowEmail(!showEmail); setShowPass(false); setMsg(''); }} style={actBtn()}>{showEmail ? 'Cancelar' : 'Alterar'}</button>
        </div>
        {showEmail && (
          <div>
            <input type="email" value={newEmail} onChange={e => setNewEmail(e.target.value)} placeholder="Novo e-mail" style={inp} />
            <input type="password" value={currPass} onChange={e => setCurrPass(e.target.value)} placeholder="Senha atual (se solicitado)" style={inp} />
            <button onClick={updateEmailFn} disabled={saving} style={actBtn()}>Salvar</button>
          </div>
        )}
      </GlassCard>

      <GlassCard style={{ padding: 18, marginBottom: 12 }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: showPass ? 14 : 0 }}>
          <div>
            <div style={{ fontSize: 13, fontWeight: 700, color: '#0F172A' }}>Senha</div>
            <div style={{ fontSize: 12.5, color: '#64748B', marginTop: 2 }}>&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;</div>
          </div>
          <button onClick={() => { setShowPass(!showPass); setShowEmail(false); setMsg(''); }} style={actBtn()}>{showPass ? 'Cancelar' : 'Alterar'}</button>
        </div>
        {showPass && (
          <div>
            <input type="password" value={newPass} onChange={e => setNewPass(e.target.value)} placeholder="Nova senha" style={inp} />
            <input type="password" value={confPass} onChange={e => setConfPass(e.target.value)} placeholder="Confirmar nova senha" style={inp} />
            <input type="password" value={currPass} onChange={e => setCurrPass(e.target.value)} placeholder="Senha atual (se solicitado)" style={inp} />
            <button onClick={updatePassFn} disabled={saving} style={actBtn()}>Salvar</button>
          </div>
        )}
      </GlassCard>

      {msg && (
        <div style={{ padding: '12px 16px', borderRadius: 12, marginBottom: 12, background: msg.startsWith('✅') ? 'rgba(22,163,74,0.1)' : 'rgba(220,38,38,0.08)', color: msg.startsWith('✅') ? '#064E3B' : '#991B1B', fontSize: 13, fontWeight: 600 }}>{msg}</div>
      )}

      <GlassCard style={{ padding: 18 }}>
        <button onClick={onLogout} style={{ width: '100%', padding: 14, border: 'none', borderRadius: 14, background: 'rgba(220,38,38,0.08)', color: '#991B1B', fontWeight: 700, fontSize: 15, cursor: 'pointer', fontFamily: 'inherit' }}>Sair da conta</button>
      </GlassCard>
      <div style={{ height: 12 }} />
    </div>
  );
}

function PartModal({ part, activity, onBack, onClose, onFinish }) {
  const contentRef = useRef(null);
  const valuesRef  = useRef({});
  const [stats, setStats]   = useState({ total: 0, filled: 0 });
  const [saving, setSaving] = useState(false);

  const partId    = part ? (part.id || part.title || '') : '';
  const fb_item   = activity?.feedback && part ? (activity.feedback[part.id || part.title]) : null;
  const isCorrected = activity?.status === 'corrected';
  const alreadyDone = !!(activity?.partsDone && activity.partsDone[partId]);

  useEffect(() => {
    if (!part || !contentRef.current) return;
    const container = contentRef.current;
    const saved  = (activity?.respostas && activity.respostas[partId]) || {};
    const values = {};
    valuesRef.current = values;
    container.innerHTML = part.content || '<p style="color:#94A3B8">Conteudo nao disponivel.</p>';
    const recount = () => {
      let filled = 0;
      Object.keys(values).forEach(k => {
        const v = values[k];
        if (typeof v === 'string' ? v.trim() !== '' : !!v) filled++;
      });
      setStats({ total: ctx.keyc.n, filled });
    };
    const ctx = { build: true, saved, values, onChange: recount, keyc: { n: 0 } };
    processExercises(container, ctx);
    recount();
  }, [part, activity]);

  const total     = stats.total;
  const filled    = stats.filled;
  const canFinish = total === 0 ? true : filled >= total;
  const pct       = total === 0 ? 100 : Math.round((filled / total) * 100);

  const handleFinish = async () => {
    if (!canFinish || saving) return;
    setSaving(true);
    await onFinish(partId, { values: { ...valuesRef.current }, respondidos: filled, total, pct });
    setSaving(false);
  };

  return (
    <div className={'modal-overlay' + (part ? ' open' : '')} onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-sheet modal-sheet-full">
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '14px 16px', borderBottom: '1px solid #F1F5F9', position: 'sticky', top: 0, background: 'white', zIndex: 1, flexShrink: 0, paddingTop: 'calc(14px + env(safe-area-inset-top, 0px))' }}>
          <button onClick={onBack} style={{ width: 32, height: 32, borderRadius: '50%', border: 'none', background: '#F1F5F9', cursor: 'pointer', fontSize: 18, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#374151', flexShrink: 0, fontFamily: 'inherit' }}>&#8249;</button>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 11, color: '#9A6438', fontWeight: 800, textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 1 }}>{activity?.title}</div>
            <div style={{ fontSize: 14, fontWeight: 700, color: '#0F172A' }}>{part?.title || 'Parte'}</div>
          </div>
          {total > 0 && !isCorrected && (
            <div style={{ fontSize: 12, fontWeight: 800, color: pct === 100 ? '#16A34A' : '#9A6438', flexShrink: 0 }}>{pct}%</div>
          )}
          <button onClick={onClose} style={{ width: 32, height: 32, borderRadius: '50%', border: 'none', background: '#F1F5F9', cursor: 'pointer', fontSize: 16, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#374151', flexShrink: 0, fontFamily: 'inherit' }}>&#x2715;</button>
        </div>

        <div ref={contentRef} className="ex-root" style={{ flex: 1, overflowY: 'auto', padding: 16, fontSize: 14.5, lineHeight: 1.75, color: '#1F2937' }} />

        {fb_item && (
          <div style={{ margin: '0 16px 16px', background: 'rgba(22,163,74,0.08)', border: '1px solid rgba(22,163,74,0.2)', borderRadius: 14, padding: 16, flexShrink: 0 }}>
            <div style={{ fontWeight: 700, color: '#064E3B', marginBottom: 8, fontSize: 13 }}>
              &#128221; Correcao do professor
              {fb_item.score && <span style={{ display: 'inline-block', background: '#064E3B', color: '#fff', fontSize: 11, fontWeight: 700, padding: '2px 10px', borderRadius: 999, marginLeft: 8 }}>{fb_item.score}</span>}
            </div>
            <div style={{ fontSize: 13, color: '#374151', lineHeight: 1.6 }}>{typeof fb_item === 'string' ? fb_item : (fb_item.comment || '')}</div>
          </div>
        )}

        {!isCorrected && (
          <div style={{ padding: '12px 16px', paddingBottom: 'calc(16px + env(safe-area-inset-bottom, 0px))', borderTop: '1px solid #F1F5F9', flexShrink: 0 }}>
            {!canFinish && (
              <div style={{ fontSize: 12, color: '#D97706', marginBottom: 8, textAlign: 'center', fontWeight: 600 }}>
                Responda todos os exercicios para finalizar ({filled}/{total})
              </div>
            )}
            <button onClick={handleFinish} disabled={!canFinish || saving} style={{
              width: '100%', padding: 14, border: 'none', borderRadius: 14, fontSize: 15, fontWeight: 800, fontFamily: 'inherit',
              cursor: canFinish && !saving ? 'pointer' : 'not-allowed',
              background: canFinish ? 'linear-gradient(180deg,#22C55E,#16A34A)' : '#CBD5E1',
              color: '#fff', boxShadow: canFinish ? '0 8px 20px rgba(22,163,74,0.3)' : 'none',
            }}>
              {saving ? 'Salvando...' : alreadyDone ? '✓ Salvar alteracoes' : 'Finalizei esta parte'}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── ROOT APP ─────────────────────────────────────────────────────
function App() {
  const [loading, setLoading]           = useState(true);
  const [user, setUser]                 = useState(null);
  const [student, setStudent]           = useState(null);
  const [posaulas, setPosaulas]         = useState([]);
  const [activities, setActivities]     = useState([]);
  const [vocab, setVocab]               = useState([]);
  const [tab, setTab]                   = useState('home');
  const [readerPost, setReaderPost]     = useState(null);
  const [openActivity, setOpenActivity] = useState(null);
  const [openPart, setOpenPart]         = useState(null);
  const [showNotifBtn, setShowNotifBtn] = useState(false);
  const [celebrate, setCelebrate]       = useState(false);
  const pendingPostId = useRef(new URLSearchParams(window.location.search).get('post') || '');

  // ── Comemoração (confete): dispara na hora que completa, em qualquer aba ──
  useEffect(() => {
    if (!student) return;
    const currentYear = new Date().getFullYear();
    const aulasAno = posaulas.filter(p => {
      const d = p.createdAt?.toDate ? p.createdAt.toDate() : (p.createdAt ? new Date(p.createdAt) : null);
      return d && d.getFullYear() === currentYear;
    }).length;
    const metaAnual  = Number(student?.metaAnual) || 40;
    const semanaAtivs = activities.filter(a => a.status !== 'corrected');
    const total       = semanaAtivs.length;
    const feitas      = semanaAtivs.filter(a => a.finalizada).length;
    const weekAtual   = semanaAtivs[0]?.week || '';

    let fire = false;
    if (total > 0 && feitas === total) {
      const k = `celeb-ativs-${student.uid}-${weekAtual}-${total}`;
      if (!localStorage.getItem(k)) { localStorage.setItem(k, '1'); fire = true; }
    }
    if (metaAnual > 0 && aulasAno >= metaAnual) {
      const k = `celeb-aulas-${student.uid}-${metaAnual}-${aulasAno}`;
      if (!localStorage.getItem(k)) { localStorage.setItem(k, '1'); fire = true; }
    }
    if (fire) setCelebrate(true);
  }, [student, posaulas, activities]);

  useEffect(() => {
    let unsub;
    (async () => {
      const fb = await getFB();
      unsub = fb.onAuthStateChanged(fb.auth, async u => {
        if (u) {
          setUser(u);
          await loadData(u.uid, fb);
          updateNotifBtn();
          syncPushIfGranted(u.uid, fb);
          if (fb.messaging) {
            fb.onMessage(fb.messaging, payload => {
              showToast('&#128196; ' + (payload.notification?.body || 'Novo pos-aula disponivel!'));
              loadData(u.uid, fb);
            });
          }
        } else {
          setUser(null); setStudent(null); setPosaulas([]); setActivities([]);
        }
        setLoading(false);
      });
    })();
    window.addEventListener('request-notif', handleRequestNotif);
    window.addEventListener('appinstalled', () => { localStorage.setItem('installDismissed','1'); updateNotifBtn(); });
    return () => { unsub?.(); window.removeEventListener('request-notif', handleRequestNotif); };
  }, []);

  async function loadData(uid, fb) {
    const [snap, posSnaps, actSnaps, vocSnaps] = await Promise.all([
      fb.getDoc(fb.doc(fb.db, 'students', uid)),
      fb.getDocs(fb.query(fb.collection(fb.db, 'students', uid, 'posaulas'), fb.orderBy('createdAt','desc'))),
      fb.getDocs(fb.query(fb.collection(fb.db, 'students', uid, 'activities'), fb.orderBy('createdAt','desc'))).catch(() => ({ docs: [] })),
      fb.getDocs(fb.query(fb.collection(fb.db, 'students', uid, 'vocabulario'), fb.orderBy('date','desc'))).catch(() => ({ docs: [] })),
    ]);
    if (!snap.exists()) return;
    setStudent({ ...snap.data(), uid });
    const posts = posSnaps.docs.map(d => ({ id: d.id, ...d.data() }));
    setPosaulas(posts);
    setActivities(actSnaps.docs.map(d => ({ id: d.id, ...d.data() })));
    setVocab(vocSnaps.docs.map(d => ({ id: d.id, ...d.data() })));
    if (pendingPostId.current && posts.length > 0) {
      const target = posts.find(p => p.id === pendingPostId.current || p.filename === pendingPostId.current);
      if (target) {
        pendingPostId.current = '';
        window.history.replaceState({}, '', window.location.pathname);
        openPost(target, fb, uid);
      }
    }
  }

  async function openPost(post, fb, uid) {
    setReaderPost(post);
    try {
      const f = fb || await getFB();
      const u = uid || user?.uid;
      if (u) await f.updateDoc(f.doc(f.db, 'students', u, 'posaulas', post.id), { readAt: f.serverTimestamp() });
    } catch(e) {}
  }

  function updateNotifBtn() {
    if (typeof Notification === 'undefined') { setShowNotifBtn(false); return; }
    setShowNotifBtn(Notification.permission === 'default' && isStandalone());
  }

  const handleRequestNotif = () => requestPush();

  async function requestPush() {
    const fb = await getFB();
    if (!fb.messaging) { showToast('Notificacoes nao suportadas neste dispositivo.'); return; }
    try {
      const perm = await Notification.requestPermission();
      if (perm !== 'granted') return;
      const sw = await getSW();
      const opts = { vapidKey: VAPID_KEY };
      if (sw) opts.serviceWorkerRegistration = sw;
      const token = await fb.getToken(fb.messaging, opts);
      if (token && user) {
        await fb.setDoc(fb.doc(fb.db, 'students', user.uid), { fcmToken: token, fcmTokens: fb.arrayUnion(token) }, { merge: true });
        localStorage.setItem('notifEnabled','1');
        setShowNotifBtn(false);
        showToast('✅ Notificacoes ativadas!');
      }
    } catch(e) {
      showToast('❌ ' + e.message);
    }
  }

  async function syncPushIfGranted(uid, fb) {
    if (!fb.messaging || typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
    try {
      const sw = await getSW();
      const opts = { vapidKey: VAPID_KEY };
      if (sw) opts.serviceWorkerRegistration = sw;
      const token = await fb.getToken(fb.messaging, opts);
      if (token) await fb.setDoc(fb.doc(fb.db, 'students', uid), { fcmToken: token, fcmTokens: fb.arrayUnion(token) }, { merge: true });
    } catch(e) {}
  }

  async function handleLogout() {
    const fb = await getFB();
    await fb.signOut(fb.auth);
  }

  if (loading) return <LoadingScreen />;
  if (!user)   return <LoginScreen />;

  if (readerPost) {
    return (
      <ReaderView post={readerPost} onBack={async () => {
        setReaderPost(null);
        const fb = await getFB();
        const snaps = await fb.getDocs(fb.query(fb.collection(fb.db, 'students', user.uid, 'posaulas'), fb.orderBy('createdAt','desc')));
        setPosaulas(snaps.docs.map(d => ({ id: d.id, ...d.data() })));
      }} />
    );
  }

  const handleOpenPost     = (post) => { getFB().then(fb => openPost(post, fb, user.uid)); };
  const handleOpenActivity = (act)  => setOpenActivity(act);
  const handleOpenPart     = (part) => setOpenPart(part);
  const handleClosePart    = ()     => setOpenPart(null);
  const handleCloseAll     = ()     => { setOpenPart(null); setOpenActivity(null); };
  const handleGoActivities = ()     => setTab('aulas');

  async function handleFinishPart(partId, result) {
    if (!openActivity || !user) return;
    const fb = await getFB();
    const actId = openActivity.id;
    const parts = openActivity.parts || [];

    // total exercises across ALL parts (for the activity-level %)
    let sumTotal = 0;
    parts.forEach(p => { sumTotal += countExercises(p.content); });

    const prevParts = (openActivity.conclusao && openActivity.conclusao.parts) || {};
    const newParts  = { ...prevParts, [partId]: { respondidos: result.respondidos, total: result.total, pct: result.pct } };
    let sumResp = 0;
    Object.keys(newParts).forEach(pid => { sumResp += (newParts[pid].respondidos || 0); });
    const atividadePct = sumTotal > 0 ? Math.round((sumResp / sumTotal) * 100) : 100;

    const newDone   = { ...(openActivity.partsDone || {}), [partId]: true };
    const allDone   = parts.every(p => newDone[p.id || p.title]);
    const conclusao = { parts: newParts, atividadePct };
    const respostas = { ...(openActivity.respostas || {}), [partId]: result.values };

    try {
      await fb.updateDoc(fb.doc(fb.db, 'students', user.uid, 'activities', actId), {
        respostas, partsDone: newDone, conclusao, finalizada: allDone,
      });
    } catch(e) { showToast('Erro ao salvar: ' + e.message); return; }

    const updated = { ...openActivity, respostas, partsDone: newDone, conclusao, finalizada: allDone };
    setActivities(prev => prev.map(a => a.id === actId ? updated : a));
    setOpenActivity(updated);
    showToast(allDone ? 'Parte salva! Atividade completa 🎉' : 'Parte salva!');
  }

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%', maxWidth: 480, margin: '0 auto', background: '#F6F1EA' }}>
      <AppHeader student={student} onNotif={requestPush} showNotifBtn={showNotifBtn} onLogout={handleLogout} />

      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minHeight: 0 }}>
        {tab === 'home'   && <HomeTab   student={student} posaulas={posaulas} activities={activities} onOpenPost={handleOpenPost} onGoActivities={handleGoActivities} />}
        {tab === 'aulas'  && <AulasTab  activities={activities} onOpenActivity={handleOpenActivity} />}
        {tab === 'vocab'  && <VocabTab vocab={vocab} />}
        {tab === 'perfil' && <PerfilTab student={student} onLogout={handleLogout} />}
      </div>

      <BottomNav active={tab} onChange={setTab} />

      <ActivityModal activity={openActivity} onClose={handleCloseAll} onOpenPart={handleOpenPart} />
      <PartModal part={openPart} activity={openActivity} onBack={handleClosePart} onClose={handleCloseAll} onFinish={handleFinishPart} />

      <Celebration show={celebrate} onDone={() => setCelebrate(false)} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

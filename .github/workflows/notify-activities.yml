name: Notify student - new activities

on:
  schedule:
    # A cada 5 minutos (o GitHub pode atrasar alguns minutos em horários de pico).
    - cron: '*/5 * * * *'
  workflow_dispatch:   # permite disparar manualmente na aba Actions

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-auth requests

      - name: Notify students for new activities
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python .github/scripts/notify_activities.py

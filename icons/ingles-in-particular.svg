<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Inglês in Particular">
  <defs>
    <path id="arcoTopo" d="M 100,100 m -76,0 a 76,76 0 0 1 152,0" fill="none"/>
    <path id="arcoBase" d="M 100,100 m -76,0 a 76,76 0 0 0 152,0" fill="none"/>
    <clipPath id="miolo"><circle cx="100" cy="100" r="60"/></clipPath>
  </defs>

  <!-- anel externo -->
  <circle cx="100" cy="100" r="99" fill="#fff"/>
  <circle cx="100" cy="100" r="95" fill="#1B4F9C"/>

  <!-- texto no anel -->
  <text font-family="Georgia, 'Times New Roman', serif" font-size="17" font-weight="700"
        fill="#fff" letter-spacing="1.2">
    <textPath href="#arcoTopo" startOffset="50%" text-anchor="middle">Inglês in Particular</textPath>
  </text>
  <text font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="13" font-weight="700"
        fill="#fff" letter-spacing="1.6">
    <textPath href="#arcoBase" startOffset="50%" text-anchor="middle">(15) 98142-6993</textPath>
  </text>

  <!-- miolo: bandeira estilizada em azul e branco -->
  <circle cx="100" cy="100" r="62" fill="#fff"/>
  <g clip-path="url(#miolo)">
    <rect x="38" y="38" width="124" height="124" fill="#1B4F9C"/>
    <!-- cruz diagonal -->
    <path d="M38,38 L162,162 M162,38 L38,162" stroke="#fff" stroke-width="16"/>
    <!-- cruz reta -->
    <path d="M100,38 V162 M38,100 H162" stroke="#fff" stroke-width="30"/>
    <path d="M100,38 V162 M38,100 H162" stroke="#1B4F9C" stroke-width="16"/>
  </g>
  <circle cx="100" cy="100" r="62" fill="none" stroke="#14396F" stroke-width="3"/>

  <!-- iniciais sobre o miolo -->
  <circle cx="100" cy="100" r="27" fill="#fff" stroke="#1B4F9C" stroke-width="2.5"/>
  <text x="100" y="110" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-size="27" font-weight="700"
        fill="#1B4F9C" letter-spacing="1">IP</text>
</svg>
